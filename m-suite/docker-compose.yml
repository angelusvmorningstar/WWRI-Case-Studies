services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: msuite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/msuite?schema=public
    depends_on:
      - db

volumes:
  pgdata:
