  position: absolute;
  top: var(--space-3);
  right: var(--space-3);
  font-size: var(--font-size-xs);
  font-weight: var(--font-weight-semibold);
  background: var(--color-primary);
  color: #fff;
  padding: 2px var(--space-2);
  border-radius: var(--radius-sm);
}

.forecast__monthly-panel {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}

.forecast__monthly-table {
  width: 100%;
  table-layout: fixed;
}

.forecast__month-col   { width: 14%; }
.forecast__ie-col      { width: 9%; }
.forecast__intake-col  { width: 10%; }
.forecast__cost-col    { width: 39%; }
.forecast__delta-col   { width: 28%; }

/* 14 + 9 + 10 + 39 + 28 = 100% */

.forecast__ie-cell {
  text-align: right;
  font-variant-numeric: tabular-nums;
  color: var(--color-text-secondary);
  font-size: var(--font-size-sm);
}

.forecast__intake-cell {
  text-align: right;
  font-variant-numeric: tabular-nums;
  color: var(--color-text-muted);
  font-size: var(--font-size-sm);
}

.forecast__intake-cell--active {
  color: var(--color-teal, #0d9488);
  font-weight: var(--font-weight-semibold);
}

.forecast__monthly-table thead .forecast__ie-col,
.forecast__monthly-table thead .forecast__intake-col {
  text-align: right;
}

/* Override base data-table left-align for numeric headers */
.forecast__monthly-table thead .forecast__cost-col,
.forecast__monthly-table thead .forecast__delta-col {
  text-align: right;
}

.forecast__cost-col--primary { font-weight: var(--font-weight-semibold); }

.forecast__month-cell { color: var(--color-text-secondary); }

.forecast__cost-cell  { text-align: right; font-variant-numeric: tabular-nums; }
.forecast__cost-cell--primary {
  font-weight: var(--font-weight-semibold);
  color: var(--color-text-primary);
}

.forecast__delta-cell {
  text-align: right;
  font-variant-numeric: tabular-nums;
  color: var(--color-text-muted);
  font-size: var(--font-size-sm);
}

.forecast__delta--up   { color: var(--color-danger); }
.forecast__delta--down { color: var(--color-success); }

.forecast__hc-panel {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}

.forecast__hc-table {
  width: 100%;
}

.forecast__hc-total-row td {
  border-top: 2px solid var(--color-border);
  background: var(--color-bg-alt);
}

/* ── Forecast view (new two-section layout) ──────────────────────────────────── */

.forecast__per-ie-panel,
.forecast__platform-panel {
  background: var(--color-bg-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-5) var(--space-6);
}

.forecast__per-ie-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-4);
  margin-bottom: var(--space-4);
}

.forecast__model-desc {
  font-size: var(--font-size-sm);
  color: var(--color-text-muted);
  margin-top: var(--space-1);
}

.forecast__model-toggle {
  display: flex;
  gap: var(--space-2);
  flex-shrink: 0;
}

.forecast__per-ie-body {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: var(--space-6);
  align-items: start;
}

.forecast__per-ie-body .table-wrapper {
  min-width: 0;
  flex-shrink: 0;
}

/* Table stays compact; breakdown takes remaining space */
.forecast__per-ie-body .forecast__monthly-table {
  min-width: 300px;
  max-width: 380px;
}

.forecast__monthly-total td {
  border-top: 2px solid var(--color-border);
  background: var(--color-bg-alt);
  font-weight: var(--font-weight-semibold);
}

.forecast__sub-breakdown {
  min-width: 220px;
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.forecast__sub-breakdown-title {
  font-size: var(--font-size-xs);
  font-weight: var(--font-weight-semibold);
  color: var(--color-text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding-bottom: var(--space-1);
  border-bottom: 1px solid var(--color-border);
}

.forecast__sub-breakdown-row {
  display: flex;
  justify-content: space-between;
  gap: var(--space-2);
  font-size: var(--font-size-sm);
}

.forecast__sub-breakdown-label {
  color: var(--color-text-secondary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.forecast__sub-breakdown-value {
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  font-weight: var(--font-weight-medium);
}

/* Platform section */
.forecast__platform-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-4);
  margin-bottom: var(--space-4);
}

.forecast__platform-totals {
  display: flex;
  gap: var(--space-4);
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
}

.forecast__platform-paused-total {
  color: var(--color-text-muted);
}

.forecast__platform-table {
  width: 100%;
}

.forecast__platform-vendor {
  font-weight: var(--font-weight-medium);
}

.forecast__platform-product {
  color: var(--color-text-secondary);
}

.forecast__platform-row--paused td {
  opacity: 0.55;
}

.forecast__platform-renewal {
  font-size: var(--font-size-xs);
  white-space: nowrap;
}

.forecast__platform-badge {
  display: inline-block;
  margin-left: var(--space-2);
  padding: 1px 7px;
  border-radius: 999px;
  font-size: var(--font-size-xs);
  font-weight: var(--font-weight-medium);
  vertical-align: middle;
  white-space: nowrap;
}

.forecast__platform-badge--scheduled {
  background: color-mix(in srgb, #b45309 12%, white);
  color: #b45309;
}

.forecast__platform-badge--paused {
  background: var(--color-bg-alt);
  color: var(--color-text-muted);
}

.forecast__platform-toggle {
  font-size: var(--font-size-xs);
  white-space: nowrap;
}

.forecast__platform-toggle--undo {
  color: #b45309;
}

.forecast__platform-toggle--activate {
  color: var(--color-primary);
}

/* ── IE Register ─────────────────────────────────────────────────────────────── */

.ie-register__sort-group {
  display: flex;
  align-items: center;
  gap: var(--space-1);
}

.ie-register__sort-label {
  font-size: var(--font-size-sm);
  color: var(--color-text-muted);
  margin-right: var(--space-1);
}

.ie-register {
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
}

/* Summary stat strip */
.ie-register__summary {
  display: flex;
  gap: var(--space-3);
}

.ie-register__stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-1);
  background: var(--color-bg-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-5);
  min-width: 100px;
}

.ie-register__stat--highlight {
  border-color: var(--color-primary);
  background: color-mix(in srgb, var(--color-primary) 6%, white);
}

.ie-register__stat-value {
  font-size: 1.75rem;
  font-weight: var(--font-weight-semibold);
  color: var(--color-text-primary);
  line-height: 1;
}

.ie-register__stat--highlight .ie-register__stat-value {
  color: var(--color-primary);
}

.ie-register__stat-label {
  font-size: var(--font-size-xs);
  color: var(--color-text-secondary);
  white-space: nowrap;
}

/* Add IE form */
.ie-register__add-form {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  background: var(--color-bg-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4);
}

.ie-register__add-name {
  flex: 1;
  min-width: 200px;
  padding: var(--space-1) var(--space-2);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  font-size: var(--font-size-sm);
  font-family: var(--font-ui);
}

.ie-register__add-month-label {
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  white-space: nowrap;
}

.ie-register__month-picker {
  display: inline-flex;
  gap: var(--space-1);
  align-items: center;
}

.ie-register__month-select,
.ie-register__year-select {
  padding: var(--space-1) var(--space-1);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  font-size: var(--font-size-sm);
  font-family: var(--font-ui);
  background: white;
  cursor: pointer;
}

.ie-register__year-select { width: 72px; }
.ie-register__month-select { width: 60px; }

/* Tag selects — cohort and region */
.ie-register__tag-select {
  appearance: none;
  -webkit-appearance: none;
  border: 1px solid var(--color-border);
  border-radius: 10px;
  padding: 2px 8px;
  font-size: var(--font-size-xs);
  font-family: var(--font-ui);
  font-weight: 500;
  cursor: pointer;
  width: 100%;
  text-align: center;
  background-color: var(--color-bg-alt);
  color: var(--color-text-secondary);
  transition: background 0.1s;
}
.ie-register__tag-select--empty {
  background: transparent;
  color: var(--color-text-secondary);
  border-color: transparent;
}
.ie-register__tag-select--empty:hover { border-color: var(--color-border); }

/* Cohort — teal (primary) */
.ie-register__tag-select--ch14,
.ie-register__tag-select--ch15,
.ie-register__tag-select--ch16,
.ie-register__tag-select--ch17,
.ie-register__tag-select--ch18,
.ie-register__tag-select--ch19,
.ie-register__tag-select--ch20,
.ie-register__tag-select--ch21,
.ie-register__tag-select--ch22,
.ie-register__tag-select--ch23 {
  background: color-mix(in srgb, var(--color-primary) 12%, white);
  color: var(--color-primary);
  border-color: color-mix(in srgb, var(--color-primary) 30%, white);
}

/* Region */
.ie-register__tag-select--apac     { background: #e8f4fd; color: #1a6fa8; border-color: #b3d9f2; }
.ie-register__tag-select--americas { background: #e8f7ee; color: #1a7a3f; border-color: #a8ddb8; }
.ie-register__tag-select--emea     { background: #fef3e2; color: #b76b0a; border-color: #f5d08a; }

/* Table */
.ie-register__table {
  width: 100%;
  table-layout: fixed;
}

.ie-register__col-name    { width: 12%; }
.ie-register__col-month   { width: 10%; }
.ie-register__col-flag    { width: 5%; text-align: center; overflow: hidden; }
.ie-register__col-divider { width: 1%; padding: 0; border: none; background: var(--color-border); }
.ie-register__col-sub     { width: 5%; text-align: center; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.ie-register__col-tag     { width: 7%; }
.ie-register__col-status  { width: 8%; }
.ie-register__col-actions { width: 13%; text-align: right; }

.ie-register__table thead .ie-register__col-flag,
.ie-register__table thead .ie-register__col-sub {
  text-align: center;
}

/* Checkbox */
.ie-register__check {
  width: 16px;
  height: 16px;
  cursor: pointer;
  accent-color: var(--color-primary);
}

.ie-register__check:disabled {
  cursor: default;
  opacity: 0.4;
}

/* Row states */
.ie-register__row--active td {
  background: color-mix(in srgb, var(--color-primary) 4%, white);
}

.ie-register__row--inactive {
  opacity: 0.5;
}

.ie-register__row--inactive td {
  color: var(--color-text-secondary);
}

/* Status badges */
.ie-register__badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: var(--font-size-xs);
  font-weight: var(--font-weight-medium);
  white-space: nowrap;
}

.ie-register__badge--active     { background: color-mix(in srgb, var(--color-primary) 15%, white); color: var(--color-primary); }
.ie-register__badge--contracted { background: #e8f4fd; color: #1a6fa8; }
.ie-register__badge--nda        { background: #fef9e7; color: #b7860b; }
.ie-register__badge--pending    { background: var(--color-bg-alt); color: var(--color-text-secondary); }
.ie-register__badge--inactive   { background: #f5f5f5; color: #999; }

/* Inline editing inputs */
.ie-register__inline-input {
  width: 100%;
  padding: 2px 6px;
  border: 1px solid var(--color-primary);
  border-radius: var(--radius-sm);
  font-size: var(--font-size-sm);
  font-family: var(--font-ui);
  outline: none;
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--color-primary) 20%, transparent);
}

.ie-register__row--editing .ie-register__month-select,
.ie-register__row--editing .ie-register__year-select {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--color-primary) 20%, transparent);
  font-size: var(--font-size-xs);
  padding: 2px 4px;
}

.ie-register__row--editing td {
  background: color-mix(in srgb, var(--color-primary) 3%, white);
}

/* Action buttons */
.ie-register__action-group {
  display: flex;
  gap: var(--space-1);
  justify-content: flex-end;
  flex-wrap: wrap;
}

.ie-register__action-btn {
  font-size: var(--font-size-xs);
  padding: 2px 8px;
  white-space: nowrap;
}

.ie-register__action-btn--deactivate {
  color: var(--color-text-secondary);
}
.ie-register__action-btn--delete {
  color: #c0392b;
}

/* Dashboard hero — registered active accent */
.dashboard__hero-stat-value--accent {
  color: var(--color-primary);
}

/* WWRI Subscription Cost Tracker — board pack print stylesheet
   Applied when window.print() is called from the Dashboard view.
   Three print modes toggled via body class (Story 6.5):
     .print-numbers-only     — values only, no provenance markers
     .print-with-footnotes   — values + per-value footnotes
     .print-full-provenance  — values + full Assumption appendix */

@page {
  size: A4 portrait;
  margin: 15mm 18mm 20mm 18mm;
}

@media print {

  /* ── Hide interactive chrome ────────────────────────────────────────────── */
  .nav-bar,
  .save-indicator,
  .needs-decision-tray,
  .decision-drawer,
  .btn,
  .page-placeholder,
  .dashboard__scenario-ticker,
  .dashboard__savings-link,
  .page-header {
    display: none !important;
  }

  /* ── Body reset ─────────────────────────────────────────────────────────── */
  body {
    background: #fff;
    color: #000;
    font-family: 'Calibri', 'Segoe UI', sans-serif;
    font-size: 10pt;
    line-height: 1.4;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* ── App shell — remove screen padding ─────────────────────────────────── */
  .app-shell {
    display: block;
  }

  .app-shell__content {
    padding: 0;
    max-width: none;
  }

  /* ── Print-only header (logo + title + date) ────────────────────────────── */
  .dashboard__print-header {
    display: flex !important;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2pt solid #009898;
    padding-bottom: 8pt;
    margin-bottom: 14pt;
  }

  .dashboard__print-header-logo {
    height: 26pt;
    width: auto;
  }

  .dashboard__print-header-title {
    font-size: 14pt;
    font-weight: 700;
    color: #009898;
  }

  .dashboard__print-header-date {
    font-size: 8.5pt;
    color: #666;
  }

  /* ── Dashboard container ────────────────────────────────────────────────── */
  .dashboard {
    display: block;
    gap: 0;
    padding-bottom: 18pt; /* clearance for fixed footer */
  }

  /* ── Headline KPI panel ─────────────────────────────────────────────────── */
  .dashboard__headline {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8pt;
    margin-bottom: 10pt;
    border: none;
    border-radius: 0;
    overflow: visible;
    page-break-after: avoid;
  }

  .dashboard__headline-col {
    padding: 8pt 10pt;
    border: 1pt solid #ddd;
    border-radius: 3pt;
  }

  .dashboard__headline-col:last-child {
    border-right: 1pt solid #ddd;
  }

  .dashboard__col-header {
    background: transparent;
    font-size: 7.5pt;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #009898;
    padding: 3pt 0;
    text-align: left;
    margin-bottom: 3pt;
  }

  .dashboard__col-amount {
    font-size: 17pt;
    font-weight: 700;
    color: #000;
    line-height: 1.1;
    padding: 4pt 0 2pt;
    text-align: left;
  }

  .dashboard__col-amount--up {
    color: #c0392b;
  }

  .dashboard__col-amount--down {
    color: #1a7a4a;
  }

  .dashboard__col-period {
    font-size: 7.5pt;
    color: #666;
    margin-top: 2pt;
    text-align: left;
  }

  .dashboard__col-desc {
    font-size: 7.5pt;
    color: #888;
    padding: 0;
    min-height: 0;
    border-bottom: none;
    margin-bottom: 3pt;
    font-style: normal;
  }

  /* ── Shared panel base ──────────────────────────────────────────────────── */
  .dashboard__savings-panel,
  .dashboard__category-panel,
  .dashboard__movers-panel {
    border: 1pt solid #ddd;
    border-radius: 0;
    padding: 8pt 10pt;
    margin-bottom: 10pt;
    page-break-inside: avoid;
  }

  /* ── Panel titles ───────────────────────────────────────────────────────── */
  .dashboard__savings-title,
  .dashboard__category-title,
  .dashboard__movers-title {
    font-size: 10pt;
    font-weight: 700;
    color: #009898;
    margin-bottom: 5pt;
  }

  /* ── Savings panel ──────────────────────────────────────────────────────── */
  .dashboard__savings-desc {
    font-size: 8.5pt;
    color: #444;
    margin-bottom: 7pt;
  }

  .dashboard__savings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 7pt;
  }

  .dashboard__savings-col {
    padding: 6pt 8pt;
    border: 1pt solid #ddd;
    border-radius: 2pt;
  }

  .dashboard__savings-col--savings {
    background: #f0faf6;
  }

  .dashboard__savings-header {
    font-size: 7.5pt;
    color: #666;
    margin-bottom: 2pt;
  }

  .dashboard__savings-amount {
    font-size: 13pt;
    font-weight: 700;
    color: #000;
  }

  .dashboard__savings-sub {
    font-size: 7pt;
    color: #888;
    margin-top: 2pt;
  }

  /* ── Category breakdown ─────────────────────────────────────────────────── */
  .dashboard__category-rows {
    display: flex;
    flex-direction: column;
    gap: 3pt;
  }

  .dashboard__category-row {
    display: grid;
    grid-template-columns: 180pt 1fr 36pt 72pt;
    align-items: center;
    gap: 6pt;
  }

  .dashboard__category-row--empty {
    opacity: 0.4;
  }

  .dashboard__category-label {
    font-size: 9pt;
    color: #222;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .dashboard__category-bar-wrap {
    height: 5pt;
    background: #e0e0e0;
    border-radius: 2.5pt;
    overflow: hidden;
  }

  .dashboard__category-bar {
    display: block;
    height: 100%;
    background: #009898;
    border-radius: 2.5pt;
  }

  .dashboard__category-pct {
    font-size: 8.5pt;
    text-align: right;
    color: #444;
  }

  .dashboard__category-amount {
    font-size: 8.5pt;
    font-weight: 600;
    text-align: right;
    color: #000;
  }

  /* ── Top movers ─────────────────────────────────────────────────────────── */
  .dashboard__movers-table {
    display: flex;
    flex-direction: column;
  }

  .dashboard__movers-header,
  .dashboard__movers-row {
    display: grid;
    grid-template-columns: 1fr 72pt 72pt 82pt 62pt;
    gap: 6pt;
    padding: 3pt 0;
    border-bottom: 0.5pt solid #ddd;
    align-items: baseline;
  }

  .dashboard__movers-row:last-child {
    border-bottom: none;
  }

  .dashboard__movers-header {
    font-size: 7pt;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #666;
  }

  .dashboard__movers-name {
    display: flex;
    flex-direction: column;
    gap: 1pt;
  }

  .dashboard__movers-vendor {
    font-size: 9pt;
    font-weight: 600;
    color: #000;
  }

  .dashboard__movers-product {
    font-size: 7.5pt;
    color: #666;
  }

  .dashboard__movers-col-num {
    font-size: 8.5pt;
    text-align: right;
    color: #222;
    white-space: nowrap;
  }

  .dashboard__movers-delta--up {
    color: #c0392b;
    font-weight: 600;
  }

  .dashboard__movers-delta--down {
    color: #1a7a4a;
    font-weight: 600;
  }

  /* ── PDF page footer ────────────────────────────────────────────────────── */
  .dashboard__print-footer {
    display: flex !important;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    justify-content: space-between;
    align-items: baseline;
    font-size: 7pt;
    color: #888;
    padding-top: 3pt;
    border-top: 0.5pt solid #ccc;
    background: #fff;
  }

  .dashboard__print-footer-left {
    font-size: 7pt;
    color: #888;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 75%;
  }

  .dashboard__print-footer-right {
    font-size: 7pt;
    color: #aaa;
    white-space: nowrap;
    text-align: right;
  }

  /* ── Provenance markers — numbers-only mode ─────────────────────────────── */
  body.print-numbers-only .assumption-marker {
    display: none !important;
  }

  /* ── Print mode sections ────────────────────────────────────────────────── */

  .dashboard__print-section-title {
    font-size: 10pt;
    font-weight: 700;
    color: #009898;
    margin-bottom: 6pt;
    padding-bottom: 3pt;
    border-bottom: 1pt solid #009898;
  }

  .dashboard__print-empty {
    font-size: 8.5pt;
    color: #888;
    font-style: italic;
  }

  /* Footnotes: visible only in with-footnotes mode */
  body.print-with-footnotes .dashboard__print-footnotes {
    display: block !important;
    margin-top: 10pt;
    page-break-inside: avoid;
  }

  .dashboard__print-fn-grid {
    display: flex;
    flex-direction: column;
  }

  .dashboard__print-fn-header,
  .dashboard__print-fn-row {
    display: grid;
    grid-template-columns: 16pt 110pt 44pt 52pt 1fr;
    gap: 4pt;
    padding: 2.5pt 0;
    border-bottom: 0.5pt solid #eee;
    align-items: baseline;
  }

  .dashboard__print-fn-row:last-child {
    border-bottom: none;
  }

  .dashboard__print-fn-header {
    font-size: 7pt;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #666;
    border-bottom-color: #ccc;
  }

  .dashboard__print-fn-cell {
    font-size: 8.5pt;
    color: #222;
  }

  .dashboard__print-fn-cell--num {
    font-size: 7.5pt;
    color: #999;
    text-align: right;
  }

  .dashboard__print-fn-cell--wide {
    color: #444;
  }

  .dashboard__print-fn-label {
    display: block;
    font-size: 8.5pt;
    font-weight: 600;
    color: #000;
  }

  .dashboard__print-fn-cat {
    display: block;
    font-size: 7pt;
    color: #888;
  }

  .dashboard__print-fn-unit {
    font-size: 7.5pt;
    color: #666;
  }

  /* Appendix: visible only in full-provenance mode, starts new page */
  body.print-full-provenance .dashboard__print-appendix {
    display: block !important;
    page-break-before: always;
  }

  .dashboard__print-appendix-entry {
    margin-bottom: 8pt;
    page-break-inside: avoid;
  }

  .dashboard__print-appendix-header {
    display: flex;
    align-items: baseline;
    gap: 6pt;
    margin-bottom: 3pt;
  }

  .dashboard__print-appendix-label {
    font-size: 9.5pt;
    font-weight: 700;
    color: #000;
  }

  .dashboard__print-appendix-key {
    font-size: 7.5pt;
    color: #888;
    font-family: 'Courier New', monospace;
  }

  .dashboard__print-appendix-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 8pt;
  }

  .dashboard__print-appendix-table td {
    padding: 1.5pt 4pt;
    border: 0.5pt solid #ddd;
    vertical-align: top;
  }

  .dashboard__print-appendix-table td:first-child {
    font-weight: 600;
    color: #444;
    width: 60pt;
    white-space: nowrap;
  }

}

</style>
