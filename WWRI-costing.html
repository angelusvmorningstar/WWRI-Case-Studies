body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F5F4F0;color:#1A1A1A;-webkit-font-smoothing:antialiased}
.card{background:#FFF;border:1px solid #DDDBD6;border-radius:8px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#888884;padding:10px 14px;text-align:left;border-bottom:1px solid #DDDBD6;user-select:none}

// ── Helpers ─────────────────────────────────────────────────────────────────
function h(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fNum(n){return n.toLocaleString('en-AU',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fCur(n){return'$'+fNum(Math.round(n));}
function fPct(n){return(n*100).toFixed(0)+'%';}
function localDate(s){
  if(!s)return null;
  // YYYY-MM-DD format
  if(/^\d{4}-\d{1,2}-\d{1,2}$/.test(s)){
    var p=s.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
  }
  // DD/MM/YYYY or D/M/YYYY
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s)){
    var p=s.split('/');return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
  }
  // DD/MM or D/M (assume current year)
  if(/^\d{1,2}\/\d{1,2}$/.test(s)){
    var p=s.split('/');return new Date(new Date().getFullYear(),parseInt(p[1])-1,parseInt(p[0]));
  }
  // Fallback
  var d=new Date(s);
  return isNaN(d)?null:d;
}

// ── Data migration: convert old [0,0,...] expert days to [null,null,...] ─────
(function migrate(){
  var P=S.project;
  if(!P.phases||P._migrated>=1)return;
  var changed=false;
  for(var pi=0;pi<P.phases.length;pi++){
    var ph=P.phases[pi];
    if(!ph.experts)continue;
    for(var ei=0;ei<ph.experts.length;ei++){
      var pe=ph.experts[ei];
      if(pe.daysPerWeek===undefined){pe.daysPerWeek=0;changed=true;}
      if(pe.actualFee===undefined){pe.actualFee=null;changed=true;}
      if(pe.days){
        for(var w=0;w<pe.days.length;w++){
          if(pe.days[w]===0){pe.days[w]=null;changed=true;}
        }
      }
    }
  }
  P._migrated=1;
  lsSet(LS_KEY,P);
})();

// ── One-time swap: Phase 1 ↔ Phase 2 (remove after confirmed) ──────────────
(function swapPhases(){
  var P=S.project;
  if(P._swapped)return;
  var temp=P.phases[0];
  P.phases[0]=P.phases[1];
  P.phases[1]=temp;
  P._swapped=true;
  lsSet(LS_KEY,P);
})();

// ── Recalculate all end dates on load ───────────────────────────────────────
(function(){
  var P=S.project;
  if(!P.phases)return;
  for(var i=0;i<P.phases.length;i++){
    var p=P.phases[i];
    if(p.startDate&&p.weeks>0){
      var d=localDate(p.startDate);
      d.setDate(d.getDate()+(p.weeks*7)-1);
      var yyyy=d.getFullYear();
      var mm=String(d.getMonth()+1).padStart(2,'0');
      var dd=String(d.getDate()).padStart(2,'0');
      p.endDate=yyyy+'-'+mm+'-'+dd;
    }
  }
  lsSet(LS_KEY,P);
})();

function msg(txt){
  if(S._mt)clearTimeout(S._mt);
  var t=setTimeout(function(){set({msg:null,_mt:null})},5000);
  set({msg:txt,_mt:t});
}

function save(){
  lsSet(LS_KEY,S.project);

function updateProject(path,val){
  var parts=path.split('.');
  var obj=S.project;
  for(var i=0;i<parts.length-1;i++){
    var k=isNaN(parts[i])?parts[i]:parseInt(parts[i]);
    obj=obj[k];
  }
  var lastKey=isNaN(parts[parts.length-1])?parts[parts.length-1]:parseInt(parts[parts.length-1]);
  obj[lastKey]=val;

  // Auto-set referral percentage when toggling active
  if(path==='referralActive'){
    S.project.referralPct=val?0.10:0.05;
  }

  // Auto-set govt impost rate when changing impost type
  if(path==='govtImpost'){
    var imp=IMPOST_OPTIONS.find(function(i){return i.name===val});
    if(imp)S.project.govtImpostRate=imp.rate;
  }

  save();
  render();
}

// ── Calculation engine ──────────────────────────────────────────────────────
function calcPhase(phaseIdx){
  var p=S.project.phases[phaseIdx];
  var experts=S.project.experts;
  var services=S.project.services;
  var wwri=S.project.wwriPct;
  var feesShare=1-wwri;

  var profFees=0, svcFees=0, wwriAmt=0;
  var expertResults=[];

  // Expert calculations
  for(var e=0;e<experts.length;e++){
    var exp=experts[e];
    var phaseExp=p.experts[e]||{actualFee:null,daysPerWeek:0,days:[]};
    if(!exp.name&&!exp.dailyFee){expertResults.push({days:0,rate:0,profFee:0,wwriContrib:0,clientCharge:0});continue;}

    // Rate: use per-phase override if set, otherwise nominal from setup
    var rate=(phaseExp.actualFee!==null&&phaseExp.actualFee!==undefined&&phaseExp.actualFee!=='')?phaseExp.actualFee:exp.dailyFee;

    // Sum days: null cells use daysPerWeek default, explicit values used as-is
    var totalDays=0;
    var dpw=phaseExp.daysPerWeek||0;
    for(var w=0;w<(p.weeks||0);w++){
      var d=phaseExp.days[w];
      totalDays+=(d!==null&&d!==undefined)?d:dpw;
    }

    var profFee=totalDays*rate;
    // WWRI contribution: fee / feesShare * wwri = fee * (wwri / feesShare)
    var wwriContrib=feesShare>0?profFee/feesShare*wwri:0;
    var clientCharge=profFee+wwriContrib;
    profFees+=profFee;
    expertResults.push({days:totalDays,rate:rate,profFee:profFee,wwriContrib:wwriContrib,clientCharge:clientCharge});
  }

  // Service calculations
  var svcResults=[];
  for(var s=0;s<services.length;s++){
    var svc=services[s];
    var phaseSvc=p.services[s]||{weeks:[]};
    if(!svc.name&&!svc.weeklyFee){svcResults.push({weeks:0,fee:0,wwriContrib:0,charge:0});continue;}
    var totalWeeks=0;
    for(var w=0;w<(p.weeks||0);w++){
      totalWeeks+=(phaseSvc.weeks[w]||0);
    }
    var fee=totalWeeks*svc.weeklyFee;
    var wwriC=feesShare>0?fee/feesShare*wwri:0;
    var charge=fee+wwriC;
    svcFees+=fee;
    svcResults.push({weeks:totalWeeks,fee:fee,wwriContrib:wwriC,charge:charge});
  }

  wwriAmt=feesShare>0?(profFees+svcFees)/feesShare*wwri:0;
  var projectSubtotal=profFees+svcFees+wwriAmt;

  // Referral fee
  var refPct=S.project.referralPartner?(S.project.referralPct||0.05):0;
  var referralFee=projectSubtotal*refPct;
  var clientCharge=projectSubtotal+referralFee;

  return{
    profFees:profFees,
    svcFees:svcFees,
    wwriAmt:wwriAmt,
    projectSubtotal:projectSubtotal,
    referralFee:referralFee,
    clientCharge:clientCharge,
    experts:expertResults,
    services:svcResults,
    refPct:refPct
  };
}

function calcTotals(){
  var totals={profFees:0,svcFees:0,wwriAmt:0,projectSubtotal:0,referralFee:0,clientCharge:0};
  var phaseResults=[];
  for(var i=0;i<4;i++){
    var p=S.project.phases[i];
    var c=calcPhase(i);
    phaseResults.push(c);
    if(p.active){
      totals.profFees+=c.profFees;
      totals.svcFees+=c.svcFees;
      totals.wwriAmt+=c.wwriAmt;
      totals.projectSubtotal+=c.projectSubtotal;
      totals.referralFee+=c.referralFee;
      totals.clientCharge+=c.clientCharge;
    }
  }
  return{totals:totals,phases:phaseResults};
}

function toYMD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function parseFlexDate(str){
  if(!str||!str.trim())return'';
  str=str.trim();

  // Already ISO format (from date picker)
  if(/^\d{4}-\d{2}-\d{2}$/.test(str))return str;

  var months=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  var now=new Date();
  var day,month,year;

  // Try d/m, d/m/yy, d/m/yyyy
  var slashMatch=str.match(/^(\d{1,2})[\/\-\.](\d{1,2})(?:[\/\-\.](\d{2,4}))?$/);
  if(slashMatch){
    day=parseInt(slashMatch[1]);
    month=parseInt(slashMatch[2])-1;
    year=slashMatch[3]?parseInt(slashMatch[3]):now.getFullYear();
    if(year<100)year+=2000;
    var d=new Date(year,month,day);
    if(!isNaN(d.getTime())&&d.getDate()===day)return toYMD(d);
  }

  // Try "20 Jul" or "20 Jul 2026" or "20 July 26"
  var textMatch=str.match(/^(\d{1,2})\s+([a-zA-Z]+)\s*(\d{2,4})?$/);
  if(textMatch){
    day=parseInt(textMatch[1]);
    var mStr=textMatch[2].toLowerCase().slice(0,3);
    var mi=months.indexOf(mStr);
    if(mi>-1){
      month=mi;
      year=textMatch[3]?parseInt(textMatch[3]):now.getFullYear();
      if(year<100)year+=2000;
      var d=new Date(year,month,day);
      if(!isNaN(d.getTime())&&d.getDate()===day)return toYMD(d);
    }
  }

  // Try "Jul 20" or "Jul 20 2026"
  var textMatch2=str.match(/^([a-zA-Z]+)\s+(\d{1,2})(?:\s*,?\s*(\d{2,4}))?$/);
  if(textMatch2){
    var mStr2=textMatch2[1].toLowerCase().slice(0,3);
    var mi2=months.indexOf(mStr2);
    if(mi2>-1){
      day=parseInt(textMatch2[2]);
      month=mi2;
      year=textMatch2[3]?parseInt(textMatch2[3]):now.getFullYear();
      if(year<100)year+=2000;
      var d=new Date(year,month,day);
      if(!isNaN(d.getTime())&&d.getDate()===day)return toYMD(d);
    }
  }

  return'';
}
function calcEndDate(pi){
  var p=S.project.phases[pi];
  if(p.startDate&&p.weeks>0){
    var d=localDate(p.startDate);
    d.setDate(d.getDate()+(p.weeks*7)-1);
    var yyyy=d.getFullYear();
    var mm=String(d.getMonth()+1).padStart(2,'0');
    var dd=String(d.getDate()).padStart(2,'0');
    p.endDate=yyyy+'-'+mm+'-'+dd;
  } else {
    p.endDate='';
  }
}

var TL_COLORS=['#009898','#C07A00','#6044B4','#1E8C4A','#C0392B','#2C6FB4','#888884'];

  set({tlAdd:{type:'milestone',pi:pi,label:'',week:''}});

function commitTlAdd(){
  var a=S.tlAdd;
  if(!a||!a.label)return;
  if(!S.project.phases[a.pi].timeline)S.project.phases[a.pi].timeline=[];
  var tl=S.project.phases[a.pi].timeline;

  if(a.mode==='edit'){
    // Edit existing item
    var item=tl[a.editIdx];
    if(!item){S.tlAdd=null;render();return;}
    item.label=a.label;
    if(a.type==='milestone'){
      var wk=parseInt(a.week);
      if(wk&&wk>=1)item.week=wk;
    } else {
      var sw=parseInt(a.startWeek);
      var ew=parseInt(a.endWeek);
      if(sw&&sw>=1)item.startWeek=sw;
      if(ew&&ew>=1)item.endWeek=ew;
    }
  } else {
    // Add new item
    var clrIdx=tl.length%TL_COLORS.length;
    if(a.type==='milestone'){
      if(!a.week||a.week<1)return;
      tl.push({type:'milestone',week:parseInt(a.week),label:a.label,color:TL_COLORS[clrIdx]});
    } else {
      if(!a.startWeek||!a.endWeek||a.startWeek<1||a.endWeek<a.startWeek)return;
      tl.push({type:'span',startWeek:parseInt(a.startWeek),endWeek:parseInt(a.endWeek),label:a.label,color:TL_COLORS[clrIdx]});
    }
  }
  S.tlAdd=null;
  save();render();

// Debounced render — skips re-render if a data-fid input is focused
var _renderTimer=null;
function debouncedRender(){
  if(_renderTimer)clearTimeout(_renderTimer);
  _renderTimer=setTimeout(function(){
    var active=document.activeElement;
    if(active&&active.getAttribute('data-fid')){
      return;
    }
    render();
  },300);
}

// Blur render — waits for focus to settle, skips if user tabbed to another grid cell
var _blurTimer=null;
function blurRender(){
  if(_blurTimer)clearTimeout(_blurTimer);
  _blurTimer=setTimeout(function(){
    var active=document.activeElement;
    if(active&&active.getAttribute('data-fid')){
      return; // focus moved to another grid cell, don't re-render
    }
    render();
  },100);
}

      out+='<td class="r mono">'+fCur(svc.weeklyFee)+'</td>';
      out+='<td class="r mono" style="font-weight:600">'+sc.weeks+'</td>';
      out+='<td class="r mono">'+fCur(sc.fee)+'</td>';
      out+='<td class="r mono" style="color:'+MUT+'">'+fCur(sc.wwriContrib)+'</td>';
      out+='<td class="r mono" style="font-weight:600">'+fCur(sc.charge)+'</td>';
      out+='</tr>';
    }

    var svcSubFee=0,svcSubWWRI=0,svcSubCharge=0;
    for(var si=0;si<phCalc.services.length;si++){svcSubFee+=phCalc.services[si].fee;svcSubWWRI+=phCalc.services[si].wwriContrib;svcSubCharge+=phCalc.services[si].charge;}
    out+='</tbody><tfoot><tr>';
    out+='<td colspan="3" style="text-align:right;font-weight:700">Subtotals</td>';
    out+='<td class="r mono" style="font-weight:700">'+fCur(svcSubFee)+'</td>';
    out+='<td class="r mono" style="font-weight:700;color:'+MUT+'">'+fCur(svcSubWWRI)+'</td>';
    out+='<td class="r mono" style="font-weight:700">'+fCur(svcSubCharge)+'</td>';
    out+='</tr></tfoot></table></div>';

    // ── Service weekly grid ──
    if(nw>0&&P.services.some(function(s){return s.name||s.weeklyFee})){
      out+='<div class="card" data-scroll-id="svc-grid-'+pi+'" style="padding:0;margin-bottom:24px;overflow-x:auto">';
      out+='<div style="padding:16px 24px 8px;font-size:14px;font-weight:700;border-bottom:1px solid '+BRD+'">Weekly allocation — services</div>';
      out+='<table class="tbl" style="min-width:'+(labelW+nw*(colW+6)+70)+'px"><thead><tr>';
      out+='<th style="width:'+labelW+'px">Service</th>';
      for(var w=0;w<nw;w++)out+='<th class="r" style="width:'+colW+'px">Wk '+(w+1)+'</th>';
      out+='<th class="r" style="width:60px">Total</th>';
      out+='</tr></thead><tbody>';

      for(var si=0;si<P.services.length;si++){
        var svc=P.services[si];
        if(!svc.name&&!svc.weeklyFee)continue;
        var ps=phase.services[si]||{weeks:[]};
        var stotal=0;

        out+='<tr>';
        out+='<td style="font-weight:600;white-space:nowrap;position:sticky;left:0;z-index:1;background:'+SUR+'">'+h(svc.name||('Service '+(si+1)))+'</td>';
        for(var w=0;w<nw;w++){
          var sv=ps.weeks[w]||0;
          stotal+=sv;
          out+='<td class="r" style="padding:4px 3px">';
          out+='<input type="number" data-fid="sw-'+pi+'-'+si+'-'+w+'" value="'+(sv||'')+'" placeholder="0" min="0" max="1" step="1" ';
          out+='onblur="blurRender()" oninput="setSvcWeek('+pi+','+si+','+w+',this.value)" ';
          out+='style="width:44px;text-align:center;font-family:Cascadia Code,Consolas,monospace;font-size:11px;';
          out+='padding:4px 2px;border:1px solid '+BRD+';border-radius:3px;color:'+TXT+';background:'+SUR+';outline:none" ';
          out+='onfocus="this.style.borderColor=\''+TEL+'\'" onfocusout="this.style.borderColor=\''+BRD+'\'"/>';
          out+='</td>';
        }
        out+='<td class="r mono" style="font-weight:600">'+stotal+'</td>';
        out+='</tr>';
      }
      out+='</tbody></table></div>';
    }

    // Navigation
    out+='<div style="display:flex;justify-content:space-between;margin-top:20px">';
    if(pi>0)out+='<button class="btn-ghost" onclick="set({phaseTab:'+(pi-1)+'})">← '+(P.phases[pi-1].name||('Phase '+pi))+'</button>';
    else out+='<div></div>';
    if(pi<3)out+='<button class="btn-primary" onclick="set({phaseTab:'+(pi+1)+'})">'+h(P.phases[pi+1].name||('Phase '+(pi+2)))+' →</button>';
    else out+='<button class="btn-primary" onclick="set({tab:\'summary\'})">Summary →</button>';
    out+='</div>';
  }

  // ── SUMMARY TAB ──
  if(S.tab==='summary'){
    var calc=calcTotals();
    out+='<div style="font-size:18px;font-weight:700;margin-bottom:20px">Project Summary</div>';

    // Phase breakdown
    out+='<div class="card" style="padding:24px;margin-bottom:24px">';
    out+='<div style="font-size:14px;font-weight:700;margin-bottom:16px">Client charges by phase</div>';
    out+='<table class="tbl"><thead><tr>';
    out+='<th></th><th class="r">Prof. Fees</th><th class="r">Services</th><th class="r">WWRI %</th><th class="r">Subtotal</th><th class="r">Referral</th><th class="r">Client Charge</th><th>Active</th>';
    out+='</tr></thead><tbody>';
    for(var i=0;i<4;i++){
      var ph=P.phases[i];
      var c=calc.phases[i];
      var nm=ph.name||('Phase '+(i+1));
      out+='<tr style="'+(ph.active?'':'opacity:.4')+'">';
      out+='<td style="font-weight:600">'+h(nm)+'</td>';
      out+='<td class="r mono">'+fCur(c.profFees)+'</td>';
      out+='<td class="r mono">'+fCur(c.svcFees)+'</td>';
      out+='<td class="r mono">'+fCur(c.wwriAmt)+'</td>';
      out+='<td class="r mono">'+fCur(c.projectSubtotal)+'</td>';
      out+='<td class="r mono">'+fCur(c.referralFee)+'</td>';
      out+='<td class="r mono" style="font-weight:700">'+fCur(c.clientCharge)+'</td>';
      out+='<td><input type="checkbox" '+(ph.active?'checked':'')+' onchange="updateProject(\'phases.'+i+'.active\',this.checked)"/></td>';
      out+='</tr>';
    }
    out+='</tbody><tfoot><tr>';
    out+='<td style="font-weight:700">Totals</td>';
    out+='<td class="r mono" style="font-weight:700">'+fCur(calc.totals.profFees)+'</td>';
    out+='<td class="r mono" style="font-weight:700">'+fCur(calc.totals.svcFees)+'</td>';
    out+='<td class="r mono" style="font-weight:700">'+fCur(calc.totals.wwriAmt)+'</td>';
    out+='<td class="r mono" style="font-weight:700">'+fCur(calc.totals.projectSubtotal)+'</td>';
    out+='<td class="r mono" style="font-weight:700">'+fCur(calc.totals.referralFee)+'</td>';
    out+='<td class="r mono" style="font-weight:700;color:'+TEL+'">'+fCur(calc.totals.clientCharge)+'</td>';
    out+='<td></td>';
    out+='</tr></tfoot></table>';
    out+='</div>';

    // Expert days by phase
    out+='<div class="card" style="padding:24px;margin-bottom:24px">';
    out+='<div style="font-size:14px;font-weight:700;margin-bottom:16px">Days by expert</div>';
    out+='<table class="tbl"><thead><tr>';
    out+='<th>Expert</th>';
    for(var i=0;i<4;i++){var pn=P.phases[i].name||('Phase '+(i+1));out+='<th class="r"'+(P.phases[i].active?'':' style="opacity:.4"')+'>'+h(pn)+'</th>';}
    out+='<th class="r" style="font-weight:700">Total Days</th>';
    out+='</tr></thead><tbody>';

    for(var ei=0;ei<P.experts.length;ei++){
      var exp=P.experts[ei];
      if(!exp.name&&!exp.dailyFee)continue;
      var totalDays=0;
      out+='<tr><td style="font-weight:600">'+h(exp.name||('Expert '+(ei+1)))+'</td>';
      for(var i=0;i<4;i++){
        var d=calc.phases[i].experts[ei]?calc.phases[i].experts[ei].days:0;
        var show=P.phases[i].active?d:0;
        totalDays+=show;
        out+='<td class="r mono"'+(P.phases[i].active?'':' style="opacity:.4"')+'>'+(show||'–')+'</td>';
      }
      out+='<td class="r mono" style="font-weight:700">'+totalDays+'</td>';
      out+='</tr>';
    }
    out+='</tbody></table></div>';

    // Expert income by phase
    out+='<div class="card" style="padding:24px;margin-bottom:24px">';
    out+='<div style="font-size:14px;font-weight:700;margin-bottom:16px">Income by expert</div>';
    out+='<table class="tbl"><thead><tr>';
    out+='<th>Expert</th>';
    for(var i=0;i<4;i++){var pn=P.phases[i].name||('Phase '+(i+1));out+='<th class="r"'+(P.phases[i].active?'':' style="opacity:.4"')+'>'+h(pn)+'</th>';}
    out+='<th class="r" style="font-weight:700">Total Income</th>';
    out+='</tr></thead><tbody>';

    for(var ei=0;ei<P.experts.length;ei++){
      var exp=P.experts[ei];
      if(!exp.name&&!exp.dailyFee)continue;
      var totalIncome=0;
      out+='<tr><td style="font-weight:600">'+h(exp.name||('Expert '+(ei+1)))+'</td>';
      for(var i=0;i<4;i++){
        var pf=calc.phases[i].experts[ei]?calc.phases[i].experts[ei].profFee:0;
        var show=P.phases[i].active?pf:0;
        totalIncome+=show;
        out+='<td class="r mono"'+(P.phases[i].active?'':' style="opacity:.4"')+'>'+(show?fCur(show):'–')+'</td>';
      }
      out+='<td class="r mono" style="font-weight:700">'+fCur(totalIncome)+'</td>';
      out+='</tr>';
    }

    // Service income row(s)
    for(var si=0;si<P.services.length;si++){
      var svc=P.services[si];
      if(!svc.name&&!svc.weeklyFee)continue;
      var totalSvcIncome=0;
      out+='<tr><td style="font-weight:600;color:'+SUB+'">'+h(svc.name||('Service '+(si+1)))+' <span style="font-size:10px;color:'+MUT+'">(service)</span></td>';
      for(var i=0;i<4;i++){
        var sf=calc.phases[i].services[si]?calc.phases[i].services[si].fee:0;
        var show=P.phases[i].active?sf:0;
        totalSvcIncome+=show;
        out+='<td class="r mono"'+(P.phases[i].active?'':' style="opacity:.4"')+'>'+(show?fCur(show):'–')+'</td>';
      }
      out+='<td class="r mono" style="font-weight:700">'+fCur(totalSvcIncome)+'</td>';
      out+='</tr>';
    }

    // Totals row
    out+='</tbody><tfoot><tr><td style="font-weight:700">Total fees</td>';
    var grandTotal=0;
    for(var i=0;i<4;i++){
      var pTotal=P.phases[i].active?(calc.phases[i].profFees+calc.phases[i].svcFees):0;
      grandTotal+=pTotal;
      out+='<td class="r mono" style="font-weight:700"'+(P.phases[i].active?'':' style="opacity:.4"')+'>'+fCur(pTotal)+'</td>';
    }
    out+='<td class="r mono" style="font-weight:700;color:'+TEL+'">'+fCur(grandTotal)+'</td>';
    out+='</tr></tfoot></table></div>';

    // WWRI share by phase
    out+='<div class="card" style="padding:24px">';
    out+='<div style="font-size:14px;font-weight:700;margin-bottom:16px">WWRI share by phase</div>';
    out+='<table class="tbl"><thead><tr>';
    out+='<th></th>';
    for(var i=0;i<4;i++){var pn=P.phases[i].name||('Phase '+(i+1));out+='<th class="r"'+(P.phases[i].active?'':' style="opacity:.4"')+'>'+h(pn)+'</th>';}
    out+='<th class="r" style="font-weight:700">Total</th>';
    out+='</tr></thead><tbody>';

    // Professional fees WWRI
    out+='<tr><td style="color:'+SUB+'">Prof. fees WWRI</td>';
    var totProfWWRI=0;
    for(var i=0;i<4;i++){
      var pw=0;
      if(P.phases[i].active){for(var ei=0;ei<calc.phases[i].experts.length;ei++)pw+=calc.phases[i].experts[ei].wwriContrib;}
      totProfWWRI+=pw;
      out+='<td class="r mono"'+(P.phases[i].active?'':' style="opacity:.4"')+'>'+fCur(pw)+'</td>';
    }
    out+='<td class="r mono" style="font-weight:700">'+fCur(totProfWWRI)+'</td></tr>';

    // Service fees WWRI
    out+='<tr><td style="color:'+SUB+'">Service fees WWRI</td>';
    var totSvcWWRI=0;
    for(var i=0;i<4;i++){
      var sw=0;
      if(P.phases[i].active){for(var si=0;si<calc.phases[i].services.length;si++)sw+=calc.phases[i].services[si].wwriContrib;}
      totSvcWWRI+=sw;
      out+='<td class="r mono"'+(P.phases[i].active?'':' style="opacity:.4"')+'>'+fCur(sw)+'</td>';
    }
    out+='<td class="r mono" style="font-weight:700">'+fCur(totSvcWWRI)+'</td></tr>';

    // Total WWRI
    out+='</tbody><tfoot><tr><td style="font-weight:700">WWRI Share</td>';
    var wwriGrand=0;
    for(var i=0;i<4;i++){
      var ww=P.phases[i].active?calc.phases[i].wwriAmt:0;
      wwriGrand+=ww;
      out+='<td class="r mono" style="font-weight:700"'+(P.phases[i].active?'':' style="opacity:.4"')+'>'+fCur(ww)+'</td>';
    }
    out+='<td class="r mono" style="font-weight:700;color:'+TEL+'">'+fCur(wwriGrand)+'</td>';
    out+='</tr></tfoot></table>';

    // WWRI as percentage of client charge
    var totalCC=calc.totals.clientCharge;
    out+='<div style="margin-top:16px;padding-top:16px;border-top:1px solid '+BRD+';display:flex;gap:32px;font-size:13px">';
    out+='<div style="color:'+SUB+'">Total WWRI share: <span class="mono" style="font-weight:700;color:'+TEL+'">'+fCur(wwriGrand)+'</span></div>';
    out+='<div style="color:'+SUB+'">As % of client charge: <span class="mono" style="font-weight:700;color:'+TEL+'">'+(totalCC?fPct(wwriGrand/totalCC):'0%')+'</span></div>';
    out+='<div style="color:'+SUB+'">Total client charge: <span class="mono" style="font-weight:700">'+fCur(totalCC)+'</span></div>';
    out+='</div>';
    out+='</div>';
  }

  // ── QUOTE & INVOICING TAB ──
  if(S.tab==='quote'){
    out+='<div style="font-size:18px;font-weight:700;margin-bottom:20px">Quote & Invoicing</div>';

    // Billing instructions
    out+='<div class="card" style="padding:24px;margin-bottom:24px">';
    out+='<div style="font-size:14px;font-weight:700;margin-bottom:16px">Invoicing configuration</div>';
    out+='<div style="color:'+MUT+';font-size:13px">Invoice schedule (per phase / whole project), invoice split (100% / 50-50 / 30-30-40), special billing instructions will render here</div>';
    out+='</div>';

    // Invoice breakdown
    out+='<div class="card" style="padding:24px;margin-bottom:24px">';
    out+='<div style="font-size:14px;font-weight:700;margin-bottom:16px">Invoice schedule</div>';
    out+='<div style="color:'+MUT+';font-size:13px">Up to 12 invoice cards showing IE Fees, Services, WWRI Share, Project Total, Referral Fee, Client Charge per invoice will render here</div>';
    out+='</div>';

    // Print button
    out+='<div style="display:flex;gap:10px">';
    out+='<button class="btn-primary" onclick="window.print()">'+IC.save+' Print / Export PDF</button>';
    out+='<button class="btn-ghost" onclick="exportProject()">'+IC.save+' Export project JSON</button>';
    out+='</div>';
  }

  // ── ADMIN TAB ──
  if(S.tab==='admin'&&S.adminMode){
    out+='<div style="font-size:18px;font-weight:700;margin-bottom:20px">Administration</div>';

    // Approved reviewers
    out+='<div class="card" style="padding:24px;margin-bottom:24px">';
    out+='<div style="font-size:14px;font-weight:700;margin-bottom:16px">Approved reviewers</div>';
    out+='<table class="tbl"><thead><tr><th>Name</th><th style="width:60px"></th></tr></thead><tbody>';
    S.admin.reviewers.forEach(function(r,i){
      out+='<tr><td>'+h(r)+'</td><td><button class="btn-ghost btn-sm" onclick="removeReviewer('+i+')">'+IC.x+'</button></td></tr>';
    });
    out+='</tbody></table>';
    out+='<div style="margin-top:12px"><button class="btn-ghost btn-sm" onclick="addReviewer()">'+IC.plus+' Add reviewer</button></div>';
    out+='</div>';

    // Admin PIN
    out+='<div class="card" style="padding:24px;margin-bottom:24px">';
    out+='<div style="font-size:14px;font-weight:700;margin-bottom:16px">Admin PIN</div>';
    out+='<div style="font-size:13px;color:'+MUT+';margin-bottom:12px">Change the PIN required to access admin settings and locked fields.</div>';
    out+='<button class="btn-ghost" onclick="changePin()">Change PIN</button>';
    out+='</div>';

    // Project file management
    out+='<div class="card" style="padding:24px;margin-bottom:24px">';
    out+='<div style="font-size:14px;font-weight:700;margin-bottom:16px">Project management</div>';
    out+='<div style="display:flex;gap:10px;flex-wrap:wrap">';
    out+='<button class="btn-ghost" onclick="exportProject()">'+IC.save+' Export project</button>';
    out+='<button class="btn-ghost" onclick="importProject()">'+IC.upload+' Import project</button>';
    out+='<button class="btn-primary btn-danger" onclick="newProject()">'+IC.x+' New project</button>';
    out+='</div></div>';
  }

  out+='</div>'; // content wrapper

  document.getElementById('app').innerHTML=out;

  // Restore scroll positions
  for(var sid in scrollMap){
    var el=document.querySelector('[data-scroll-id="'+sid+'"]');
    if(el)el.scrollLeft=scrollMap[sid];
  }
}

// ── Admin functions ─────────────────────────────────────────────────────────
function addReviewer(){
  var name=prompt('Reviewer name:');
  if(!name||!name.trim())return;
  S.admin.reviewers.push(name.trim());
  S.admin.reviewers.sort();
  saveAdmin(S.admin);
  render();
}

function removeReviewer(idx){
  if(!confirm('Remove '+S.admin.reviewers[idx]+'?'))return;
  S.admin.reviewers.splice(idx,1);
  saveAdmin(S.admin);
  render();
}

function changePin(){
  var current=prompt('Current PIN:');
  if(current!==S.admin.adminPin){msg('Incorrect PIN');return;}
  var newPin=prompt('New PIN (4 digits):');
  if(!newPin||newPin.length<4){msg('PIN must be at least 4 characters');return;}
  S.admin.adminPin=newPin;
  saveAdmin(S.admin);
  msg('PIN updated');
}

// ── Init ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
