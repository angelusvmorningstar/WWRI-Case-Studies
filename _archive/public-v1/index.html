<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WWRI Toolkit</title>
  <link rel="stylesheet" href="./css/theme.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/shared/tables.css">
  <link rel="stylesheet" href="./css/shared/forms.css">
  <link rel="stylesheet" href="./css/shared/cards.css">
  <link rel="stylesheet" href="./css/shared/charts.css">
  <link rel="stylesheet" href="./css/finance/dashboard.css">
  <link rel="stylesheet" href="./css/finance/cash-forecast.css">
  <link rel="stylesheet" href="./css/finance/revenue-pipeline.css">
  <link rel="stylesheet" href="./css/finance/finance-controls.css">
  <link rel="stylesheet" href="./css/pipeline/pipeline-controls.css">
  <script type="module" src="./js/app.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <span class="app-header__logo">WWRI Toolkit</span>
      <div class="mode-switcher" role="radiogroup" aria-label="Report mode">
        <button class="mode-switcher__btn mode-switcher__btn--active"
                type="button"
                role="radio"
                aria-checked="true"
                data-mode="finance">Finance Report</button>
        <button class="mode-switcher__btn"
                type="button"
                role="radio"
                aria-checked="false"
                data-mode="pipeline">Pipeline Report</button>
      </div>
    </div>
  </header>

  <nav class="tab-bar" aria-label="Report tabs">
    <div class="tab-bar__inner" role="tablist">
      <!-- Tab buttons injected by app.js -->
    </div>
  </nav>

  <main class="app-content" id="app-content">
    <!-- Tab content rendered by app.js -->
  </main>
</body>
</html>
