<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#F5F4F0;font-family:'Calibri','Segoe UI',system-ui,sans-serif;color:#1A1A1A}
.btn-primary{display:inline-flex;align-items:center;gap:7px;background:#009898;color:#fff;border:none;border-radius:6px;padding:0 18px;height:38px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .12s;white-space:nowrap}
.btn-primary:hover{background:#007878}
.btn-ghost{display:inline-flex;align-items:center;gap:7px;background:none;color:#555550;border:1px solid #DDDBD6;border-radius:6px;padding:0 14px;height:36px;font-size:13px;cursor:pointer;font-family:inherit;transition:background .1s;white-space:nowrap}
.btn-ghost:hover{background:rgba(0,0,0,.04)}
.btn-sm{height:28px;padding:0 10px;font-size:11px}
.btn-danger{background:#C0392B}
.btn-danger:hover{background:#a93226}
.card{background:#FFF;border:1px solid #DDDBD6;border-radius:10px}
.tab-btn{display:flex;align-items:center;padding:0 20px;background:none;border:none;border-bottom:2px solid transparent;color:#555550;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;height:44px;transition:color .1s;white-space:nowrap}
.tab-btn.on{color:#009898;border-bottom-color:#009898}
.mode-btn{display:flex;align-items:center;gap:6px;padding:0 16px;height:34px;background:none;border:1px solid #DDDBD6;border-radius:6px;color:#555550;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .1s,color .1s,border-color .1s;white-space:nowrap}
.mode-btn.on{background:#009898;border-color:#009898;color:#fff}
.mode-btn:not(.on):hover{background:rgba(0,0,0,.04)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888884;background:#F5F4F0;border-bottom:1px solid #DDDBD6;text-align:left;cursor:pointer;user-select:none;white-space:nowrap}
.tbl th.on{color:#009898}
.tbl td{padding:11px 14px;border-bottom:1px solid #DDDBD6}
.tbl tr:nth-child(even) td{background:#FAFAF8}
.tbl tr:hover td{background:#F0EFEC}
.tbl tfoot td{padding:12px 14px;background:#F5F4F0;border-top:2px solid #DDDBD6;font-weight:700}
.mono{font-family:'Cascadia Code',Consolas,monospace}
.r{text-align:right}
.badge{display:inline-flex;align-items:center;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px}
::-webkit-scrollbar{width:6px;height:6px}
.print-only{display:none}
@media print{
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{background:#fff!important;font-family:'Calibri','Segoe UI',sans-serif;margin:0;padding:0}
  #app>*:not(.print-only){display:none!important}
  .print-only{display:block!important}
  .print-page{background:#fff!important;margin:0!important;padding:0!important;box-shadow:none!important;border:none!important;border-radius:0!important}
  .page-break{page-break-before:always;break-before:page;margin-top:0;padding-top:0}
  table{page-break-inside:auto}
  tr{page-break-inside:avoid;break-inside:avoid}
  @page{size:A4 portrait;margin:12mm 14mm 12mm 14mm;marks:none}
  @page:first{margin-top:12mm}
}
::-webkit-scrollbar-track{background:#F5F4F0}
::-webkit-scrollbar-thumb{background:#DDDBD6;border-radius:3px}
</style>

function lsGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

// ── CSV ─────────────────────────────────────────────────────────────────────
function parseLine(line, delim){
  if(delim==='\t'){return line.split('\t').map(function(v){return v.trim()});}
  var r=[],cur='',q=false,i=0,ch;
  for(;i<line.length;i++){
    ch=line[i];
    if(ch==='"'){q=!q}
    else if(ch===','&&!q){r.push(cur);cur=''}
    else{cur+=ch}
  }
  r.push(cur);
  return r;
}
function parseCSV(text){
  var lines=text.trim().split('\n');
  var firstLine=lines[0];
  var delim=firstLine.indexOf('\t')!==-1?'\t':',';
  var hdr=parseLine(firstLine,delim).map(function(x){return x.trim()});
  return lines.slice(1).filter(Boolean).map(function(l){
    var vals=parseLine(l,delim),row={};
    hdr.forEach(function(k,i){row[k]=(vals[i]||'').trim()});
    return row;
  });
}
function toStageKey(s){
  if(!s)return null;
  if(s.indexOf('M4')===0)return'M4';
  if(s.indexOf('M3')===0)return'M3';
  if(s.indexOf('M2.5')===0)return'M2.5';
  if(s.indexOf('M2')===0)return'M2';
  if(s.indexOf('M1.5')===0)return'M1.5';
  if(s.indexOf('M1')===0)return'M1';
  return null;
}
function toDeal(r){
  var stage=(r['Deal Stage']||'').trim();
  return{
    id:r['Record ID']||('r'+Math.random()),
    name:(r['Deal Name']||'').trim().replace(/\u2013/g,'-').replace(/\u2014/g,'-').replace(/\u2019/g,"'"),
    company:(r['Associated Company']||'').trim(),
    stage:stage,sk:toStageKey(stage),
    lead:(r['IE Lead']||'').trim(),
    amt:parseFloat(r['Amount'])||0,
    close:(r['Close Date']||'').split(' ')[0],
    act:(r['Last Activity Date']||'').split(' ')[0],
    ref:(r['Referee']||'').trim(),
    dm1:parseFloat(r['Days_M1'])||null,
    dm15:parseFloat(r['Days_M1.5'])||null,
    dm2:parseFloat(r['Days_M2'])||null,
    dm25:parseFloat(r['Days_M2.5'])||null,
    dm3:parseFloat(r['Days_M3'])||null,
    dm4:parseFloat(r['Days_M4'])||null
  };
}
function isHistoric(rows){
  return rows.some(function(r){var s=(r['Deal Stage']||'').trim();return s==='Closed Won'||s==='Closed Lost'||s==='Dormant'});
}

// ── Format ──────────────────────────────────────────────────────────────────
function fUSD(n,c){
  if(c){
    if(Math.abs(n)>=1e6)return'$'+(n/1e6).toFixed(2)+'M';
    if(Math.abs(n)>=1e3)return'$'+Math.round(n/1e3).toLocaleString()+'K';
    return'$'+Math.round(n).toLocaleString();
  }
  return'$'+Math.round(n).toLocaleString('en-US');
}
function fPct(n){return(n*100).toFixed(0)+'%';}
function fNum(n){return n.toLocaleString('en-AU',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fDate(s){
  if(!s)return'–';
  var d=new Date(s);
  if(isNaN(d.getTime()))return s;
  return d.toLocaleDateString('en-AU',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function overdue(s){return!!s&&new Date(s)<new Date()}
function mKey(s){
  if(!s)return null;
  var d=new Date(s);
  if(isNaN(d.getTime()))return null;
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function mLabel(k){
  var p=k.split('-');
  return new Date(+p[0],+p[1]-1,1).toLocaleDateString('en-AU',{month:'short',year:'2-digit'});
}

  // Bars + X labels
  data.forEach(function(d,i){
    var x=PL+i*step+(step-barW)/2;
    var bH=niceMax>0?d.value/niceMax*cH:0;

    svg+='<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+bH+'" rx="3" fill="'+fill+'"/>';

    var lx=PL+i*step+step/2;

    if(bH>22){

function svgStackedArea(data){

  function yp(v){return PT+cH*(1-v/niceMax);}

  var svg='<svg width="100%" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';

  // Y gridlines + labels
  var ticks=[0,500000,1000000,1500000,2000000,2500000,3000000];

    svg+='<text x="'+(PL-5)+'" y="'+(ty+4).toFixed(1)+'" text-anchor="end" fill="'+MUT+'" font-size="10" '+FONT+'>'+fUSD(tv,true)+'</text>';
  }

  // Polygons
  var fwd3='',fwd2='',fwd1='';
  for(i=0;i<n;i++){
    var px=xp(i).toFixed(1);
    fwd3+=px+','+yp(data[i].active+data[i].m34+data[i].m12).toFixed(1)+' ';
    fwd2+=px+','+yp(data[i].active+data[i].m34).toFixed(1)+' ';
    fwd1+=px+','+yp(data[i].active).toFixed(1)+' ';
  }
  var br=(PL+cW).toFixed(1)+','+yp(0).toFixed(1);
  var bl=PL.toFixed(1)+','+yp(0).toFixed(1);
  svg+='<polygon points="'+fwd3+br+' '+bl+'" fill="'+CL+'"/>';
  svg+='<polygon points="'+fwd2+br+' '+bl+'" fill="'+CM+'"/>';
  svg+='<polygon points="'+fwd1+br+' '+bl+'" fill="'+CA+'"/>';

  // Edge lines
  var p3='',p2='',p1='';
  for(i=0;i<n;i++){
    var pp=(i===0?'M':'L')+xp(i).toFixed(1)+',';
    p3+=pp+yp(data[i].active+data[i].m34+data[i].m12).toFixed(1);
    p2+=pp+yp(data[i].active+data[i].m34).toFixed(1);
    p1+=pp+yp(data[i].active).toFixed(1);
  }
  svg+='<path d="'+p3+'" fill="none" stroke="'+CL+'" stroke-width="1.2" opacity="0.6"/>';
  svg+='<path d="'+p2+'" fill="none" stroke="#7A3D1C" stroke-width="1" opacity="0.5"/>';
  svg+='<path d="'+p1+'" fill="none" stroke="#122A4E" stroke-width="1" opacity="0.5"/>';

  // X axis — angled labels
  var axisY=PT+cH+16;
  for(i=0;i<n;i++){
    var lx=xp(i).toFixed(1);
    svg+='<text x="'+lx+'" y="'+axisY+'" text-anchor="end" transform="rotate(-45,'+lx+','+axisY+')" fill="'+MUT+'" font-size="10" '+FONT+'>'+data[i].label+'</text>';
  }

  // Legend — top right, above data
  var ly=14,lx=W-PR;
  lx-=52;
  svg+='<rect x="'+lx+'" y="'+ly+'" width="10" height="10" fill="'+CL+'" stroke="'+BRD+'" stroke-width="0.5"/>';
  svg+='<text x="'+(lx+14)+'" y="'+(ly+9)+'" fill="'+MUT+'" font-size="10" '+FONT+'>M1 – M2</text>';
  lx-=82;
  svg+='<rect x="'+lx+'" y="'+ly+'" width="10" height="10" fill="'+CM+'"/>';
  svg+='<text x="'+(lx+14)+'" y="'+(ly+9)+'" fill="'+MUT+'" font-size="10" '+FONT+'>M3 – M4</text>';

  svg+='<text x="'+(lx+14)+'" y="'+(ly+9)+'" fill="'+MUT+'" font-size="10" '+FONT+'>Active projects</text>';

  svg+='</svg>';
  return svg;
}

// ── SVG funnel ───────────────────────────────────────────────────────────────
function svgFunnel(sum,tot,idSuffix){
  if(tot<=0)return'<div style="padding:40px;text-align:center;color:'+MUT+';font-size:13px">No pipeline data.</div>';
  var TY=40,BY=420,CX=260,TLX=60,TRX=460,H=380,HALF=200;
  var order=['M1','M1.5','M2','M2.5','M3','M4'];
  var clrs={M1:'#C0DD97','M1.5':'#97C459',M2:'#639922','M2.5':'#3B6D11',M3:'#EF9F27',M4:'#D85A30'};
  function rX(y){return CX+(BY-y)/H*HALF;}
  var VW=680,VH=460;
  var svg='<svg width="100%" viewBox="0 0 '+VW+' '+VH+'" xmlns="http://www.w3.org/2000/svg">';
  svg+='<defs><clipPath id="fc'+(idSuffix||'')+'"><polygon points="'+CX+','+BY+' '+TLX+','+TY+' '+TRX+','+TY+'"/></clipPath></defs>';
  var y=TY,bands=[];
  order.forEach(function(k){
    var val=sum[k]?sum[k].total:0,bh=val/tot*H;
    bands.push({key:k,val:val,y:y,h:bh,clr:clrs[k]});y+=bh;
  });
  svg+='<g clip-path="url(#fc'+(idSuffix||'')+')">';
  bands.forEach(function(b){if(b.h>0)svg+='<rect x="'+TLX+'" y="'+b.y.toFixed(1)+'" width="'+(TRX-TLX)+'" height="'+Math.ceil(b.h+1)+'" fill="'+b.clr+'"/>';});
  svg+='</g>';
  bands.forEach(function(b,i){
    if(i===0)return;
    var lx=CX-(BY-b.y)/H*HALF+2,rx=CX+(BY-b.y)/H*HALF-2;
    if(rx>lx)svg+='<line x1="'+lx.toFixed(1)+'" y1="'+b.y.toFixed(1)+'" x2="'+rx.toFixed(1)+'" y2="'+b.y.toFixed(1)+'" stroke="white" stroke-width="1" opacity="0.5"/>';
  });
  svg+='<polygon points="'+CX+','+BY+' '+TLX+','+TY+' '+TRX+','+TY+'" fill="none" stroke="'+BRD+'" stroke-width="1.2"/>';
  var LX=475,MIN_GAP=26;
  var visible=bands.filter(function(b){return b.h>=1;});
  var labelY=visible.map(function(b){return b.y+b.h/2;});
  for(var pass=0;pass<10;pass++){
    for(var ii=labelY.length-2;ii>=0;ii--){if(labelY[ii+1]-labelY[ii]<MIN_GAP)labelY[ii]=labelY[ii+1]-MIN_GAP;}
    for(var jj=1;jj<labelY.length;jj++){if(labelY[jj]-labelY[jj-1]<MIN_GAP)labelY[jj]=labelY[jj-1]+MIN_GAP;}
  }
  labelY=labelY.map(function(ly){return Math.max(TY+8,Math.min(BY-8,ly));});
  visible.forEach(function(b,idx){
    var midY=b.y+b.h/2,ly=labelY[idx],pct=Math.round(b.val/tot*100);
    var rx=rX(midY);
    svg+='<line x1="'+rx.toFixed(1)+'" y1="'+midY.toFixed(1)+'" x2="'+(LX-4)+'" y2="'+ly.toFixed(1)+'" stroke="'+MUT+'" stroke-width="0.8" stroke-dasharray="3 2"/>';
    svg+='<text font-size="11" font-weight="700" font-family="Calibri,Segoe UI,sans-serif" x="'+LX+'" y="'+(ly+2)+'" fill="'+TXT+'">'+b.key+'</text>';
    svg+='<text font-size="10" font-family="Calibri,Segoe UI,sans-serif" x="'+LX+'" y="'+(ly+14)+'" fill="'+SUB+'">'+fUSD(b.val,true)+'  '+pct+'%</text>';
  });
  svg+='<text font-size="10" font-family="Calibri,Segoe UI,sans-serif" x="'+CX+'" y="'+(VH-8)+'" text-anchor="middle" fill="'+MUT+'">Total: '+fUSD(tot)+'</text>';
  svg+='</svg>';
  return svg;
}

// HubSpot exports: hubspot-crm-exports-...-2026-03-23_11_33_49.csv
function parseDateFromFilename(name){
  var m=name.match(/(\d{4})-(\d{2})-(\d{2})/);
  if(m){
    var d=new Date(+m[1],+m[2]-1,+m[3]);
    if(!isNaN(d.getTime()))return d.toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'});
  }
  return new Date().toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'});
}

function openRolling(){document.getElementById('fi-rolling').click()}
function onFileRolling(el){
  var f=el.files[0];el.value='';
  if(!f)return;
  var r=new FileReader();r.onload=function(e){
    var rows=parseCSV(e.target.result);
    if(!rows.length){msg('No data found in rolling totals file');return;}
    // Parse: columns are months, rows are Active Projects / M3-M4 / M1-M2
    var headers=Object.keys(rows[0]);
    var monthCols=headers.filter(function(k){return k.trim()&&k.trim()!==''&&k.trim()!=='Total'});
    var byLabel={};
    rows.forEach(function(r){var lbl=(r['']||r[headers[0]]||'').trim();if(lbl)byLabel[lbl]=r;});
    var active=byLabel['Active Projects']||byLabel['Active projects']||{};
    var m34=byLabel['M3 - M4']||byLabel['M3-M4']||byLabel['M3 – M4']||{};
    var m12=byLabel['M1 - M2']||byLabel['M1-M2']||byLabel['M1 – M2']||{};
    function parseUSD(s){if(!s)return 0;return parseInt(String(s).replace(/[^\d]/g,''))||0;}
    function monthKey(label){
      var parts=label.trim().split('-');
      if(parts.length!==2)return null;
      var mm={'Jan':'01','Feb':'02','Mar':'03','Apr':'04','May':'05','Jun':'06',
               'Jul':'07','Aug':'08','Sep':'09','Oct':'10','Nov':'11','Dec':'12'};
      var m=mm[parts[0].trim()];
      if(!m)return null;
      return'20'+parts[1].trim()+'-'+m;
    }
    var newSnaps=[];
    monthCols.forEach(function(label){
      var key=monthKey(label);
      if(!key)return;
      newSnaps.push({key:key,label:label.trim(),active:parseUSD(active[label]),m34:parseUSD(m34[label]),m12:parseUSD(m12[label])});
    });
    newSnaps.sort(function(a,b){return a.key<b.key?-1:1;});
    // Merge with existing localStorage snaps — rolling CSV wins for any overlapping month
    var stored=lsGet(KS)||[];
    var merged={};
    stored.forEach(function(s){merged[s.key]=s;});
    newSnaps.forEach(function(s){merged[s.key]=s;});
    var combined=Object.values(merged).sort(function(a,b){return a.key<b.key?-1:1;}).slice(-24);
    lsSet(KS,combined);
    var entry={type:'rolling',name:f.name,date:new Date().toISOString(),count:newSnaps.length};
    var log=[entry].concat(S.log).slice(0,20);
    lsSet(KL,log);
    set({snaps:combined,log:log});
    msg('Rolling totals loaded — '+newSnaps.length+' months imported');
  };r.readAsText(f);
}

// ── Import ───────────────────────────────────────────────────────────────────
function openFile(){document.getElementById('fi').click()}
function onFile(el){
  var f=el.files[0];
  el.value='';
  if(!f||(!f.name.endsWith('.csv')&&!f.name.endsWith('.tsv')))return;
  var r=new FileReader();
  r.onload=function(e){onCSV(e.target.result,f.name)};
  r.readAsText(f);
}
function onCSV(text,name){
  var rows=parseCSV(text).filter(function(r){return r['Deal Name']});
  if(!rows.length)return;
  if(isHistoric(rows)&&S.db&&Object.keys(S.db).length>0){
    set({confirm:{rows:rows,name:name}});
  } else if(isHistoric(rows)){
    doSeed(rows,name);
  } else {
    doMerge(rows,name);
  }
}
function doSeed(rows,name){
  var db={};
  rows.forEach(function(r){var d=toDeal(r);db[d.id]=d});
  var dataDate=parseDateFromFilename(name);
  var entry={type:'seed',name:name,date:new Date().toISOString(),dataDate:dataDate,count:rows.length};
  var log=[entry].concat(S.log).slice(0,20);
  var snaps=takeSnapshot(db);
  lsSet(KB,db);lsSet(KL,log);
  set({db:db,log:log,snaps:snaps,stale:[],confirm:null});
  msg('Database seeded — '+rows.length+' records loaded');
}
function doMerge(rows,name){
  var db=Object.assign({},S.db||{});
  var added=0,updated=0,seen={};
  rows.forEach(function(r){
    var d=toDeal(r);seen[d.id]=1;
    if(db[d.id]){db[d.id]=Object.assign({},d,{company:d.company||db[d.id].company});updated++}
    else{db[d.id]=d;added++}
  });
  var stale=Object.values(db).filter(function(d){return d.sk&&!seen[d.id]});
  var dataDate=parseDateFromFilename(name);
  var entry={type:'merge',name:name,date:new Date().toISOString(),dataDate:dataDate,added:added,updated:updated,stale:stale.length};
  var log=[entry].concat(S.log).slice(0,20);
  var snaps=takeSnapshot(db);
  lsSet(KB,db);lsSet(KL,log);
  set({db:db,log:log,snaps:snaps,stale:stale,confirm:null});
  msg('Import complete — '+added+' added, '+updated+' updated'+(stale.length>0?', '+stale.length+' flagged':''));
}
function markLost(id){
  var db=Object.assign({},S.db);
  if(db[id])db[id]=Object.assign({},db[id],{stage:'Closed Lost',sk:null});
  lsSet(KB,db);
  set({db:db,stale:S.stale.filter(function(d){return d.id!==id})});
}
function dismissStale(id){set({stale:S.stale.filter(function(d){return d.id!==id})})}
function saveBL(){
  if(!S.db)return;
  var active=Object.values(S.db).filter(function(d){return d.sk});
  var sum={};STAGES.forEach(function(s){sum[s.key]={count:0,total:0}});
  active.forEach(function(d){if(sum[d.sk]){sum[d.sk].count++;sum[d.sk].total+=d.amt}});

// ── Pipeline snapshot ─────────────────────────────────────────────────────────
function takeSnapshot(db){
  var active=Object.values(db).filter(function(d){return d.sk});
  var sum={};STAGES.forEach(function(s){sum[s.key]={count:0,total:0}});
  active.forEach(function(d){if(sum[d.sk]){sum[d.sk].count++;sum[d.sk].total+=d.amt}});
  var m34=(sum.M4.total+sum.M3.total);
  var m12=active.reduce(function(s,d){return s+d.amt},0)-m34;
  var wonDeals=Object.values(db).filter(function(d){return d.stage==='Closed Won'});
  var activeAmt=wonDeals.reduce(function(s,d){return s+d.amt},0); // placeholder — active projects not in HubSpot pipeline
  var dt=new Date();
  var label=dt.toLocaleDateString('en-AU',{month:'short',year:'2-digit'}).replace(' ','-');
  var key=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
  // Keep one snapshot per month-key — overwrite if same month
  var existing=lsGet(KS)||[];
  var filtered=existing.filter(function(s){return s.key!==key});
  var snap={key:key,label:label,active:0,m34:m34,m12:m12};
  var updated=[snap].concat(filtered).sort(function(a,b){return a.key<b.key?-1:1}).slice(-24);
  lsSet(KS,updated);
  return updated;
}

// ── Sort ─────────────────────────────────────────────────────────────────────
function srt(type,col){
  if(type==='p'){var s=S.sp;set({sp:{col:col,dir:s.col===col&&s.dir==='asc'?'desc':'asc'}})}
  else{var w=S.sw;set({sw:{col:col,dir:w.col===col&&w.dir==='desc'?'asc':'desc'}})}
}
function toTs(s){var d=s?new Date(s):null;return(d&&!isNaN(d))?d.getTime():0;}
function sorter(sc,dir){
  return function(a,b){
    var va,vb;
    if(sc==='sk'){va=STAGES.findIndex(function(s){return s.key===a.sk});vb=STAGES.findIndex(function(s){return s.key===b.sk})}
    else if(sc==='amt'){va=a.amt;vb=b.amt}
    else if(sc==='close'){va=toTs(a.close);vb=toTs(b.close)}
    else{va=(a[sc]||'').toLowerCase();vb=(b[sc]||'').toLowerCase()}
    return dir==='asc'?(va<vb?-1:va>vb?1:0):(va>vb?-1:va<vb?1:0);
  };
}
function arrow(col,type){var s=type==='p'?S.sp:S.sw;return s.col===col?(s.dir==='asc'?IC.up:IC.dn):''}
function thCls(col,type){return(type==='p'?S.sp:S.sw).col===col?'on':''}

// ── Analytics data computation ────────────────────────────────────────────────
function computeAnalytics(deals,won,active,tot,sum){
  var now12=new Date();
  var cutoff12=new Date(now12);cutoff12.setFullYear(cutoff12.getFullYear()-1);
  var won12=won.filter(function(d){return d.close&&new Date(d.close)>=cutoff12;});
  var won12Tot=won12.reduce(function(s,d){return s+d.amt;},0);
  var wonTot=won.reduce(function(s,d){return s+d.amt;},0);
  var mat=(sum.M4?sum.M4.total:0)+(sum.M3?sum.M3.total:0);

  function getPhases(name){
    var phases=[],nu=name.toUpperCase();
    var ms=nu.match(/P(\d+)/g);if(ms)ms.forEach(function(m){phases.push(parseInt(m.slice(1)));});
    var ps=nu.match(/PHASE\s+(\d+)/g);if(ps)ps.forEach(function(m){phases.push(parseInt(m.replace(/PHASE\s+/,''),10));});
    return phases.filter(function(p){return p>0;}).filter(function(p,i,a){return a.indexOf(p)===i;});
  }

  // Phase progression
  var clientPhases={};
  won.forEach(function(d){
    var co=d.company||d.name.substring(0,30);
    var phases=getPhases(d.name);
    if(!clientPhases[co])clientPhases[co]=[];
    phases.forEach(function(p){if(clientPhases[co].indexOf(p)<0)clientPhases[co].push(p);});
  });
  var phasedClients=Object.values(clientPhases).filter(function(ps){return ps.length>0;});
  var totalPC=phasedClients.length;
  var p1c=phasedClients.filter(function(ps){return ps.indexOf(1)>=0;}).length;
  var p2c=phasedClients.filter(function(ps){return ps.indexOf(2)>=0;}).length;
  var p3c=phasedClients.filter(function(ps){return ps.indexOf(3)>=0;}).length;
  var pastP3=won.filter(function(d){return getPhases(d.name).some(function(p){return p>=4;});});

  // IE origination
  var ieOriginate={};
  won.forEach(function(d){
    var phases=getPhases(d.name);
    if(phases.indexOf(1)<0)return;
    var l=d.lead||'(unassigned)',co=d.company||d.name.substring(0,30);
    if(!ieOriginate[l])ieOriginate[l]={lead:l,clients:[],total:0,count:0};
    if(ieOriginate[l].clients.indexOf(co)<0)ieOriginate[l].clients.push(co);
    ieOriginate[l].count++;ieOriginate[l].total+=d.amt;
  });
  var ieOriginateArr=Object.values(ieOriginate).sort(function(a,b){return b.clients.length-a.clients.length;});

  // IE active split
  var ieActive={},ieActiveMature={},ieActiveDev={},ieWon12={};
  var matureKeys=['M3','M4'];
  active.forEach(function(d){
    var l=d.lead||'(unassigned)';var isMature=matureKeys.indexOf(d.sk)>=0;
    if(!ieActive[l])ieActive[l]={lead:l,count:0,total:0};
    ieActive[l].count++;ieActive[l].total+=d.amt;
    if(isMature){if(!ieActiveMature[l])ieActiveMature[l]={lead:l,count:0,total:0};ieActiveMature[l].count++;ieActiveMature[l].total+=d.amt;}
    else{if(!ieActiveDev[l])ieActiveDev[l]={lead:l,count:0,total:0};ieActiveDev[l].count++;ieActiveDev[l].total+=d.amt;}
  });
  won12.forEach(function(d){
    var l=d.lead||'(unassigned)';
    if(!ieWon12[l])ieWon12[l]={lead:l,count:0,total:0,deals:[]};
    ieWon12[l].count++;ieWon12[l].total+=d.amt;ieWon12[l].deals.push(d);
  });
  var ieActiveArr=Object.values(ieActive).sort(function(a,b){return b.total-a.total;});
  var ieActiveMatureArr=Object.values(ieActiveMature).sort(function(a,b){return b.total-a.total;});
  var ieActiveDevArr=Object.values(ieActiveDev).sort(function(a,b){return b.total-a.total;});
  var ieWon12Arr=Object.values(ieWon12).sort(function(a,b){return b.total-a.total;});
  ieWon12Arr.forEach(function(ie){ie.avg=ie.count?ie.total/ie.count:0;});
  var matTot=ieActiveMatureArr.reduce(function(s,ie){return s+ie.total;},0);
  var devTot=ieActiveDevArr.reduce(function(s,ie){return s+ie.total;},0);

  // Client concentration
  var coActive={},coWon12={};
  active.forEach(function(d){
    var c=d.company||'(unknown)';
    if(!coActive[c])coActive[c]={company:c,count:0,total:0};
    coActive[c].count++;coActive[c].total+=d.amt;
  });
  won12.forEach(function(d){
    var c=d.company||'(unknown)';
    if(!coWon12[c])coWon12[c]={company:c,count:0,total:0};
    coWon12[c].count++;coWon12[c].total+=d.amt;
  });
  var coActiveArr=Object.values(coActive).sort(function(a,b){return b.total-a.total;});
  var coWon12Arr=Object.values(coWon12).sort(function(a,b){return b.total-a.total;});

  // Referrer map
  var refMap={};
  active.forEach(function(d){
    if(!d.ref)return;
    if(!refMap[d.ref])refMap[d.ref]={ref:d.ref,ac:0,av:0,wc:0,wv:0};
    refMap[d.ref].ac++;refMap[d.ref].av+=d.amt;
  });
  won12.forEach(function(d){
    if(!d.ref)return;
    if(!refMap[d.ref])refMap[d.ref]={ref:d.ref,ac:0,av:0,wc:0,wv:0};
    refMap[d.ref].wc++;refMap[d.ref].wv+=d.amt;
  });
  var refArr=Object.values(refMap).sort(function(a,b){return(b.av+b.wv)-(a.av+a.wv);});

  // Monthly won
  var wonByMonth={};
  won12.forEach(function(d){
    var k=mKey(d.close);
    if(!wonByMonth[k])wonByMonth[k]={key:k,label:mLabel(k),count:0,total:0};
    wonByMonth[k].count++;wonByMonth[k].total+=d.amt;
  });
  var wonMonthArr=Object.values(wonByMonth).sort(function(a,b){return a.key<b.key?-1:1;});

  return{won12:won12,won12Tot:won12Tot,wonTot:wonTot,mat:mat,
    totalPC:totalPC,p1c:p1c,p2c:p2c,p3c:p3c,pastP3:pastP3,getPhases:getPhases,
    ieOriginateArr:ieOriginateArr,ieActiveArr:ieActiveArr,
    ieActiveMatureArr:ieActiveMatureArr,ieActiveDevArr:ieActiveDevArr,
    ieWon12Arr:ieWon12Arr,matTot:matTot,devTot:devTot,
    coActiveArr:coActiveArr,coWon12Arr:coWon12Arr,
    refArr:refArr,wonMonthArr:wonMonthArr};
}

function onFileLeads(el){
  var f=el.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    var text=e.target.result;
    var lines=text.split(/\r?\n/);
    if(!lines.length)return;
    var hdrs=lines[0].split(',').map(function(h){return h.replace(/^"|"$/g,'').trim();});
    var records=[];
    for(var i=1;i<lines.length;i++){
      if(!lines[i].trim())continue;
      var vals=lines[i].match(/("(?:[^"\\]|\\.)*"|[^,]*)/g)||[];
      var obj={};
      hdrs.forEach(function(h,j){obj[h]=(vals[j]||'').replace(/^"|"$/g,'').trim();});
      var stg=obj['Lead Stage']||'';
      if(!stg.startsWith('0.'))continue;
      var owner=obj['Contact owner']||'';
      if(!owner)continue;
      var sk=stg.includes('0.1')?'0.1':stg.includes('0.2')?'0.2':stg.includes('0.3')?'0.3':stg;
      var entered=obj['Date entered current stage']||'';
      var days=null;
      try{var d=new Date(entered.substring(0,10));if(!isNaN(d)){days=Math.floor((new Date()-d)/86400000);}}catch(e){}
      records.push({id:obj['Record ID'],first:obj['First Name'],last:obj['Last Name'],
        co:obj['Associated Company (Primary)'],owner:owner,stage:sk,
        cat:obj['Category']||'Uncategorised',pri:obj['Prioritisation'],days:days,
        lastAct:(obj['Last Activity Date']||'').substring(0,10),
        linkedin:obj['Linkedin account']||''});
    }
    lsSet(KLD,records);
    set({leads:records});
    msg('Imported '+records.length+' leads from '+f.name);
  };
  r.readAsText(f);
  el.value='';
}

function initExpenses(){
  var stored=lsGet(K_EXP);
  if(stored)return stored;
  var exp={};
  EXP_LINES.forEach(function(l){
    exp[l.key]=(EXP_DEFAULTS[l.key]||[0,0,0,0,0,0,0,0,0]).slice();
  });
  return exp;
}

function recalcFcst(){
  var fc=SEED_FCST;
  var exp=S.exp;
  var nm=fc.months.length;

  // Sum overhead
  var oh=[];for(var i=0;i<nm;i++)oh.push(0);
  EXP_LINES.forEach(function(l){
    if(l.cat==='overhead'){
      for(var i=0;i<nm;i++)oh[i]+=(exp[l.key]||[])[i]||0;
    }
  });
  fc.opex.total_overhead=oh;

  // Sum discretionary
  var disc=[];for(var i=0;i<nm;i++)disc.push(0);
  EXP_LINES.forEach(function(l){
    if(l.cat==='discretionary'){
      for(var i=0;i<nm;i++)disc[i]+=(exp[l.key]||[])[i]||0;
    }
  });
  fc.discretionary.total=disc;

  // Tax
  fc.tax=exp.tax||[0,0,0,0,0,0,0,0,0];

  // Total opex
  var tot=[];for(var i=0;i<nm;i++)tot.push(oh[i]+disc[i]+(fc.tax[i]||0));
  fc.opex_total=tot;

  // Net cash = gross profit - opex
  var net=[];for(var i=0;i<nm;i++)net.push(fc.gp_total[i]-tot[i]);
  fc.net_cash=net;

  // Potential net = net + potential GP
  var pnet=[];for(var i=0;i<nm;i++){
    pnet.push(net[i]+(fc.potential.au_gp[i]||0)+(fc.potential.eu_gp[i]||0)+(fc.potential.us_gp[i]||0));
  }
  fc.potential_net=pnet;

  // Cash positions
  var openBal=fc.opening_forecast[0]; // starting balance from actuals
  for(var i=0;i<nm;i++){
    fc.opening_forecast[i]=i===0?openBal:fc.closing_forecast[i-1];
    fc.closing_forecast[i]=fc.opening_forecast[i]+net[i];
  }
  for(var i=0;i<nm;i++){
    fc.opening_potential[i]=i===0?openBal:fc.closing_potential[i-1];
    fc.closing_potential[i]=fc.opening_potential[i]+pnet[i];
  }
}

// ── Revenue → Forecast wiring ────────────────────────────────────────────────
function recalcRevForecast(){
  var fc=SEED_FCST;
  var fx=S.fx||SEED_FX;
  var rev=S.rev||[];
  var nm=fc.months.length;

  // Zero out revenue arrays (keep index 0 = actuals untouched for non-rev rows)
  var rAU=[],cAU=[],gAU=[];
  var rEU=[],cEU=[],gEU=[];
  var rUS=[],cUS=[],gUS=[];
  var pAUr=[],pAUg=[];
  var pEUr=[],pEUg=[];
  var pUSr=[],pUSg=[];
  for(var i=0;i<nm;i++){
    rAU.push(0);cAU.push(0);gAU.push(0);
    rEU.push(0);cEU.push(0);gEU.push(0);
    rUS.push(0);cUS.push(0);gUS.push(0);
    pAUr.push(0);pAUg.push(0);
    pEUr.push(0);pEUg.push(0);
    pUSr.push(0);pUSg.push(0);
  }

  rev.forEach(function(r){
    var mi=fc.months.indexOf(r.dueMo);
    if(mi===-1)return; // outside forecast window

    var fxr=fx[r.cur]||1;
    var revAud=r.rev*fxr;
    var refFee=revAud*(r.refPct||0);
    var projTotal=revAud-refFee;
    var ieFees=projTotal*(r.iePct||0);
    var gp=projTotal-ieFees;
    var cos=refFee+ieFees;

    var isForecasted=(r.status===1||r.status===2); // Contracted or Certain
    var ent=r.entity||'AU';

    if(isForecasted){
      if(ent==='AU'){rAU[mi]+=revAud;cAU[mi]+=cos;gAU[mi]+=gp;}
      else if(ent==='EU'){rEU[mi]+=revAud;cEU[mi]+=cos;gEU[mi]+=gp;}
      else if(ent==='US'){rUS[mi]+=revAud;cUS[mi]+=cos;gUS[mi]+=gp;}
    } else {
      // Uncertain → potential
      if(ent==='AU'){pAUr[mi]+=revAud;pAUg[mi]+=gp;}
      else if(ent==='EU'){pEUr[mi]+=revAud;pEUg[mi]+=gp;}
      else if(ent==='US'){pUSr[mi]+=revAud;pUSg[mi]+=gp;}
    }
  });

  // Preserve actuals column (index 0) from original seed
  rAU[0]=fc.rev_au.total[0];cAU[0]=fc.cos_au.total[0];gAU[0]=fc.gp_au[0];

  // Update forecast arrays
  fc.rev_au.total=rAU;fc.cos_au.total=cAU;fc.gp_au=gAU;
  fc.rev_eu.total=rEU;fc.cos_eu.total=cEU;fc.gp_eu=gEU;
  fc.rev_us.total=rUS;fc.cos_us.total=cUS;fc.gp_us=gUS;

  // Total GP
  var gpT=[];for(var i=0;i<nm;i++)gpT.push(gAU[i]+gEU[i]+gUS[i]);
  fc.gp_total=gpT;

  // Potential
  fc.potential.au_rev=pAUr;fc.potential.au_gp=pAUg;
  fc.potential.eu_rev=pEUr;fc.potential.eu_gp=pEUg;
  fc.potential.us_rev=pUSr;fc.potential.us_gp=pUSg;

  // Now recalc opex and cash
  recalcFcst();
}

// ── FX rate fetch ────────────────────────────────────────────────────────────
function fetchFX(){
  msg('Fetching rates...');
  fetch('https://api.frankfurter.app/latest?from=AUD&to=EUR,USD,GBP,SGD')
    .then(function(res){return res.json()})
    .then(function(data){
      if(!data.rates)throw new Error('No rates returned');
      // frankfurter returns how much 1 AUD buys, we need how much 1 foreign = AUD
      var fx=Object.assign({},S.fx);
      fx.AUD=1;
      if(data.rates.EUR)fx.EUR=Math.round((1/data.rates.EUR)*100)/100;
      if(data.rates.USD)fx.USD=Math.round((1/data.rates.USD)*100)/100;
      if(data.rates.GBP)fx.GBP=Math.round((1/data.rates.GBP)*100)/100;
      if(data.rates.SGD)fx.SGD=Math.round((1/data.rates.SGD)*100)/100;
      lsSet('ww_fx',fx);
      S.fx=fx;
      recalcRevForecast();
      touch();
      msg('FX rates updated ('+new Date().toLocaleDateString('en-AU')+')');
    })
    .catch(function(err){
      msg('FX fetch failed: '+err.message);
    });
}

// ── Finance CSV import helpers ──────────────────────────────────────────────
function parseFinCSV(text){
  var sep=text.indexOf('\t')>-1?'\t':',';
  return text.split('\n').map(function(line){
    return line.split(sep).map(function(c){return c.replace(/^"|"$/g,'').trim()});
  });
}

function findRow(rows,pattern){
  for(var i=0;i<rows.length;i++){
    var label=(rows[i][0]||'')+(rows[i][1]||'');
    if(label.indexOf(pattern)>-1)return rows[i];
  }
  return null;
}

function pv(s){return parseFloat((s||'0').replace(/,/g,''))||0;}

// ── P&L Import (month or YTD, AU or EU) ─────────────────────────────────────
function importPL(entity,type,text){
  var rows=parseFinCSV(text);
  // Find header row (contains "Account")
  var hdr=null,hdrIdx=-1;
  for(var i=0;i<rows.length;i++){
    if((rows[i][0]||'').indexOf('Account')>-1){hdr=rows[i];hdrIdx=i;break;}
  }
  if(!hdr){msg('Could not find header row');return;}

  var curLabel=hdr[1]||'Current';
  var p1Label=hdr[2]||'Prior 1';
  var p2Label=hdr[3]||'Prior 2';

  // Extract period from "For the month ended..." or header
  var periodLine=null;
  for(var i=0;i<Math.min(hdrIdx,6);i++){
    var l=rows[i][0]||'';
    if(l.indexOf('month ended')>-1||l.indexOf('period')>-1){periodLine=l;break;}
  }

  // Find key totals
  var rev=findRow(rows,'Total Trading Income');
  var cos=findRow(rows,'Total Cost of Sales');
  var gp=findRow(rows,'Gross Profit');
  var opex=findRow(rows,'Total Operating Expenses');
  var net=findRow(rows,'Net Profit');

  // Find sub-lines
  var intl=findRow(rows,'International Sales');
  var reimb=findRow(rows,'Reimbursement');
  var ie=findRow(rows,'International Experts');
  var ref_f=findRow(rows,'Referral Partner');
  var cexp=findRow(rows,'Client-Charged');

  var pl=Object.assign({},S.pl);
  var key=entity.toLowerCase()+'_'+type; // au_mo, eu_mo, au_ytd, eu_ytd

  var d={
    revenue:pv(rev?rev[1]:0),cos:pv(cos?cos[1]:0),gp:pv(gp?gp[1]:0),
    opex:pv(opex?opex[1]:0),net:pv(net?net[1]:0),
    p1:{label:p1Label,revenue:pv(rev?rev[2]:0),cos:pv(cos?cos[2]:0),gp:pv(gp?gp[2]:0),opex:pv(opex?opex[2]:0),net:pv(net?net[2]:0)},
    p2:{label:p2Label,revenue:pv(rev?rev[3]:0),cos:pv(cos?cos[3]:0),gp:pv(gp?gp[3]:0),opex:pv(opex?opex[3]:0),net:pv(net?net[3]:0)}
  };

  if(type==='mo'){
    d.intl_sales=pv(intl?intl[1]:0);
    d.reimb=pv(reimb?reimb[1]:0);
    d.ie_fees=pv(ie?ie[1]:0);
    d.ref_fees=pv(ref_f?ref_f[1]:0);
    d.client_exp=pv(cexp?cexp[1]:0);
  }
  if(type==='ytd'){
    d.label=curLabel;
  }

  pl[key]=d;
  if(periodLine)pl.period=periodLine.replace(/For the month ended /i,'').replace(/For the period /i,'').trim();

  lsSet(K_PL,pl);
  S.pl=pl;
  touch();
  msg('Imported P&L '+entity+' ('+type+')');
  render();
}

// ── Balance Sheet Import (AU or EU) ─────────────────────────────────────────
function importBS(entity,text){
  var rows=parseFinCSV(text);

  // Find period from "As at..." line
  var period='';
  for(var i=0;i<6;i++){
    var l=rows[i]?rows[i][0]||'':'';
    if(l.indexOf('As at')>-1){period=l.replace('As at ','').trim();break;}
  }

  function findVal(pattern){
    var r=findRow(rows,pattern);
    if(!r)return 0;
    // Value is in last non-empty column
    for(var c=r.length-1;c>=0;c--){
      if(r[c]&&r[c]!==''){var v=pv(r[c]);if(v!==0||r[c]==='0')return v;}
    }
    return 0;
  }

  // Bank accounts
  var bankDetail=[];
  var inBank=false;
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    var label=(r[0]||'')+(r[1]||'');
    if(label.indexOf('Bank')>-1&&label.indexOf('Total')===-1&&label.indexOf('Fee')===-1&&label.indexOf('Reval')===-1){
      inBank=true;continue;
    }
    if(inBank){
      if(label.indexOf('Total Bank')>-1){inBank=false;continue;}
      var name=(r[1]||r[0]||'').trim();
      var val=pv(r[r.length-1]);
      if(name&&name!=='Bank')bankDetail.push({name:name,val:val});
    }
  }

  var data={
    bank:findVal('Total Bank'),
    bank_detail:bankDetail,
    current_assets:findVal('Total Current Assets'),
    fixed_assets:findVal('Total Fixed Assets'),
    non_current_assets:findVal('Total Non-current Assets'),
    assets:findVal('Total Assets'),
    current_liabilities:findVal('Total Current Liabilities'),
    liabilities:findVal('Total Liabilities'),
    unearned_income:findVal('Unearned Income'),
    net_assets:findVal('Net Assets'),
    retained_earnings:findVal('Retained Earnings'),
    share_capital:findVal('Ordinary shares')||findVal('Share Capital'),
    current_year:findVal('Current Year Earnings')
  };

  if(entity==='EU'){
    data.bank_currency='EUR';
  }
  if(entity==='US'){
    data.bank_currency='USD';
  }

  // Extract FX rates from AU balance sheet
  var bs=Object.assign({},S.bs);
  bs[entity.toLowerCase()]=data;
  if(period)bs.period=period;

  // Parse FX rates if present (AU BS has them at bottom)
  if(entity==='AU'){
    for(var i=0;i<rows.length;i++){
      var l=rows[i]?rows[i][0]||'':'';
      var m=l.match(/^([\d.]+)\s+EUR/);
      if(m)bs.fx_eur=Math.round((1/parseFloat(m[1]))*100)/100;
      m=l.match(/^([\d.]+)\s+USD/);
      if(m)bs.fx_usd=Math.round((1/parseFloat(m[1]))*100)/100;
    }
  }

  lsSet(K_BS,bs);
  S.bs=bs;
  touch();
  msg('Imported Balance Sheet '+entity);
  render();
}

// ── SVG Cash Chart ───────────────────────────────────────────────────────────
function svgCashChart(data){
  var W=740,H=300,padL=72,padR=24,padT=24,padB=52;
  var cW=W-padL-padR, cH=H-padT-padB;
  var n=data.length;
  if(n<2)return'';

  // Find min/max across both series
  var allVals=[];
  data.forEach(function(d){allVals.push(d.forecast,d.potential)});
  var rawMin=Math.min.apply(null,allVals);
  var rawMax=Math.max.apply(null,allVals);
  // Add 10% padding and round to nice numbers
  var range=rawMax-rawMin||1;
  var vMin=Math.floor((rawMin-range*0.08)/10000)*10000;
  var vMax=Math.ceil((rawMax+range*0.08)/10000)*10000;
  if(vMin>0)vMin=0; // Always show zero line if data is positive

  function xPos(i){return padL+(cW/(n-1))*i;}
  function yPos(v){return padT+cH-(((v-vMin)/(vMax-vMin))*cH);}

  var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:'+W+'px;display:block">';

  // Gridlines
  var gridSteps=5;
  var gridStep=(vMax-vMin)/gridSteps;
  for(var g=0;g<=gridSteps;g++){
    var gv=vMin+gridStep*g;
    var gy=yPos(gv);
    svg+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" stroke="'+BRD+'" stroke-width="1"/>';
    svg+='<text x="'+(padL-8)+'" y="'+(gy+4)+'" text-anchor="end" font-size="11" fill="'+MUT+'" font-family="Cascadia Code,Consolas,monospace">';
    if(Math.abs(gv)>=1000)svg+='$'+Math.round(gv/1000)+'K';
    else svg+='$'+Math.round(gv);
    svg+='</text>';
  }

  // Zero line (if visible)
  if(vMin<0&&vMax>0){
    var zy=yPos(0);
    svg+='<line x1="'+padL+'" y1="'+zy+'" x2="'+(W-padR)+'" y2="'+zy+'" stroke="'+MUT+'" stroke-width="1" stroke-dasharray="4,3"/>';
  }

  // Negative zone fill (below zero)
  if(vMin<0){
    var zy2=yPos(0);
    var botY=yPos(vMin);
    svg+='<rect x="'+padL+'" y="'+zy2+'" width="'+cW+'" height="'+(botY-zy2)+'" fill="'+RED+'" opacity="0.04"/>';
  }

  // Build path strings
  var fPath='',pPath='';
  // Also build fill path for potential area between the two lines
  var areaPath='';
  data.forEach(function(d,i){
    var x=xPos(i);
    var yf=yPos(d.forecast);
    var yp=yPos(d.potential);
    fPath+=(i===0?'M':'L')+x+','+yf;
    pPath+=(i===0?'M':'L')+x+','+yp;
  });

  // Fill area between potential and forecast
  var fillPath='';
  for(var i=0;i<n;i++){fillPath+=(i===0?'M':'L')+xPos(i)+','+yPos(data[i].potential);}
  for(var i=n-1;i>=0;i--){fillPath+='L'+xPos(i)+','+yPos(data[i].forecast);}
  fillPath+='Z';
  svg+='<path d="'+fillPath+'" fill="'+GRN+'" opacity="0.08"/>';

  // Potential line (behind)
  svg+='<path d="'+pPath+'" fill="none" stroke="'+GRN+'" stroke-width="2" stroke-dasharray="6,4"/>';

  // Forecast line (front)
  svg+='<path d="'+fPath+'" fill="none" stroke="'+TEL+'" stroke-width="2.5"/>';

  // Data points and labels
  data.forEach(function(d,i){
    var x=xPos(i);
    var yf=yPos(d.forecast);
    var yp=yPos(d.potential);

    // Forecast dot
    svg+='<circle cx="'+x+'" cy="'+yf+'" r="4" fill="'+SUR+'" stroke="'+TEL+'" stroke-width="2"/>';
    // Potential dot (only if different)
    if(Math.abs(d.potential-d.forecast)>500){
      svg+='<circle cx="'+x+'" cy="'+yp+'" r="3.5" fill="'+SUR+'" stroke="'+GRN+'" stroke-width="1.5"/>';
    }

    // Value label on forecast (show for first, last, min, max, and every 3rd)
    if(i===0||i===n-1||i%3===0||d.forecast===Math.min.apply(null,data.map(function(d2){return d2.forecast}))||d.forecast===Math.max.apply(null,data.map(function(d2){return d2.forecast}))){
      var labY=d.forecast<0?(yf+16):(yf-10);
      svg+='<text x="'+x+'" y="'+labY+'" text-anchor="middle" font-size="10" font-weight="600" fill="'+(d.forecast<0?RED:TEL)+'" font-family="Cascadia Code,Consolas,monospace">';
      svg+=fUSD(d.forecast,true);
      svg+='</text>';
    }

    // Month label
    svg+='<text x="'+x+'" y="'+(H-padB+20)+'" text-anchor="middle" font-size="11" fill="'+MUT+'">'+d.m+'</text>';
  });

  // Legend
  svg+='<line x1="'+padL+'" y1="'+(H-8)+'" x2="'+(padL+20)+'" y2="'+(H-8)+'" stroke="'+TEL+'" stroke-width="2.5"/>';
  svg+='<text x="'+(padL+26)+'" y="'+(H-4)+'" font-size="11" fill="'+SUB+'">Forecast cash</text>';
  svg+='<line x1="'+(padL+140)+'" y1="'+(H-8)+'" x2="'+(padL+160)+'" y2="'+(H-8)+'" stroke="'+GRN+'" stroke-width="2" stroke-dasharray="6,4"/>';
  svg+='<text x="'+(padL+166)+'" y="'+(H-4)+'" font-size="11" fill="'+SUB+'">Potential cash (incl. uncertain)</text>';

  svg+='</svg>';
  return svg;
}

// ── Render ───────────────────────────────────────────────────────────────────
function render(){
  var db=S.db,has=db&&Object.keys(db).length>0;
  var deals=db?Object.values(db):[];
  var active=deals.filter(function(d){return d.sk});
  var won=deals.filter(function(d){return d.stage==='Closed Won'});
