<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Structured Interview Tool — Whitewater Reinventions</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#F5F4F0}
    body{font-family:'Calibri','Segoe UI',system-ui,sans-serif;color:#1A1A1A}
    #root{min-height:100vh}
    .ww-btn-primary{display:inline-flex;align-items:center;gap:8px;background:#009898;color:#fff;border:none;border-radius:6px;padding:0 20px;height:48px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .12s}
    .ww-btn-primary:hover{background:#007878}
    .ww-btn-primary:disabled{opacity:.4;cursor:default}
    .ww-btn-secondary{display:inline-flex;align-items:center;gap:8px;background:none;color:#009898;border:1px solid #009898;border-radius:6px;padding:0 16px;height:40px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .12s}
    .ww-btn-secondary:hover{background:rgba(0,152,152,.08)}
    .ww-btn-ghost{display:inline-flex;align-items:center;gap:8px;background:none;color:#555550;border:1px solid #DDDBD6;border-radius:6px;padding:0 16px;height:40px;font-size:14px;cursor:pointer;font-family:inherit;transition:background .1s}
    .ww-btn-ghost:hover{background:rgba(0,0,0,.05)}
    .ww-btn-ghost:disabled{opacity:.3;cursor:default}
    .ww-btn-danger{display:inline-flex;align-items:center;gap:8px;background:#C0392B;color:#fff;border:none;border-radius:6px;padding:0 20px;height:40px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
    .ww-field{background:#FFFFFF;border:1.5px solid #AAAAA5;border-radius:4px;color:#1A1A1A;font-size:15px;padding:11px 14px;font-family:inherit;width:100%;outline:none;transition:border-color .1s}
    .ww-field:focus{border-color:#009898;box-shadow:0 0 0 3px rgba(0,152,152,.12)}
    .ww-field::placeholder{color:#888884}
    .ww-card{background:#FFFFFF;border:1px solid #DDDBD6;border-radius:10px}
    .ww-person-card{background:#FFFFFF;border:1px solid #DDDBD6;border-radius:10px;padding:18px;transition:border-color .1s,transform .1s;cursor:pointer}
    .ww-person-card:hover{border-color:#009898;transform:translateY(-1px)}
    .ww-person-card.done{opacity:.6;cursor:default}
    .ww-person-card.done:hover{border-color:#DDDBD6;transform:none}
    .tab-btn{display:flex;align-items:center;gap:8px;padding:0 22px;background:none;border:none;border-bottom:3px solid transparent;color:#555550;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;height:100%;transition:color .1s}
    .tab-btn.active{color:#009898;border-bottom-color:#009898}
    .tab-btn.tab-disabled{color:#DDDBD6;cursor:default;opacity:.5}
    .topic-block{background:#FFFFFF;border:1px solid #DDDBD6;border-radius:10px;overflow:hidden;margin-bottom:10px}
    .topic-block-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .1s}
    .topic-block-header:hover{background:#F5F4F0}
    .topic-block-body{border-top:1px solid #DDDBD6;padding:20px 18px;background:#FAFAF8}
    .subtopic-card{border:1.5px solid #DDDBD6;border-radius:8px;background:#FFFFFF;padding:14px 16px;cursor:pointer;transition:border-color .15s,background .15s}
    .subtopic-card:hover{border-color:#009898;background:rgba(0,152,152,.04)}
    .subtopic-card.selected{border-color:#009898;background:rgba(0,152,152,.05)}
    .subtopic-card.capped{opacity:.4;cursor:not-allowed}
    .subtopic-card.capped:hover{border-color:#DDDBD6;background:#FFFFFF}
    .example-row{display:block;background:#F5F4F0;border:1px solid #DDDBD6;border-radius:6px;padding:8px 12px;font-size:13px;color:#555550;cursor:pointer;margin-bottom:6px;line-height:1.45;transition:background .1s;text-align:left;font-family:inherit;width:100%}
    .example-row:hover{background:#ECEAE4}
    input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:4px;outline:none;cursor:pointer;background:transparent}
    input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:#009898;border:3px solid #FFFFFF;box-shadow:0 2px 6px rgba(0,0,0,.18);cursor:pointer}
    input[type="range"]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#009898;border:3px solid #FFFFFF;box-shadow:0 2px 6px rgba(0,0,0,.18);cursor:pointer}
    select.ww-field option{background:#FFFFFF;color:#1A1A1A}

    @media print {
      body { background: #FFFFFF !important; }
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      .report-page { page-break-after: always; break-after: page; }
      .report-page:last-child { page-break-after: avoid; break-after: avoid; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
    .print-only { display: none; }
    ::-webkit-scrollbar{width:8px}
    ::-webkit-scrollbar-track{background:#F5F4F0}
    ::-webkit-scrollbar-thumb{background:#DDDBD6;border-radius:4px}
    ::-webkit-scrollbar-thumb:hover{background:#AAAAA5}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useRef } = React;
const C = { bg:'#F5F4F0', sur:'#FFFFFF', elv:'#F0EFEC', brd:'#DDDBD6', mut:'#888884', sub:'#555550', wht:'#1A1A1A', tel:'#009898', amb:'#C07A00', red:'#C0392B', grn:'#1E8C4A' };
const sc = v => v==null?C.mut:v>=70?C.grn:v>=40?C.amb:C.red;
const fmt = s => String(Math.floor(s/60))+':'+String(s%60).padStart(2,'0');
const newSess = () => ({ status:'pending', background:{}, scores:{}, notes:{}, startedAt:null });
const MAX_ST = 3;
const CATS = ['Executive','Senior Management','Middle Management'];
const DEFAULT_BENCHMARKS = { 'Executive':{ adequate:40, best:85 }, 'Senior Management':{ adequate:20, best:60 }, 'Middle Management':{ adequate:10, best:40 } };

const TOPIC_LIBRARY = [
  { id:'t1', name:'Leadership & strategic direction', subtopics:[
    { id:'st1a', name:'Personal vision & ambition', defaultMins:6, purpose:"Understand the interviewee's strategic ambition for their own area, their sense of personal ownership, and how well their vision aligns with broader priorities.", examples:["When you think about your part of the business, what would you most like to see change or improve over the next few years?","If you had a free hand to change one thing about how your area operates, what would it be and why?","What does a successful outcome look like for your function in three years' time?"], crit:[{ id:'c_st1a_1', name:'Strategic ambition', hi:'Articulates a clear, forward-looking vision with specific goals', lo:'Vague, short-term, or limited to business-as-usual' },{ id:'c_st1a_2', name:'Personal ownership', hi:'Takes personal responsibility for delivering outcomes', lo:'Defers to others or waits for direction' }]},
    { id:'st1b', name:'Organisational vision & strategy', defaultMins:5, purpose:"Understand how the interviewee frames the organisation's future — their strategic mindset, commercial awareness, and ability to think beyond their own area.", examples:["Thinking about the organisation as a whole, what does success look like in three to five years?","Where do you think the organisation needs to go, and is it currently heading in the right direction?","What would need to be true for this organisation to be best in class in five years?"], crit:[{ id:'c_st1b_1', name:'Enterprise thinking', hi:'Considers the whole business — operations, functions, stakeholders', lo:'Narrowly focused on own area or function' },{ id:'c_st1b_2', name:'Commitment to the enterprise', hi:"Genuine engagement with the organisation's future beyond own area", lo:'Limited interest or narrow focus' },{ id:'c_st1b_3', name:'Strategic thinking', hi:'Thinks in terms of long-term priorities; connects actions to broader goals', lo:'Focused on immediate tasks or waits for direction' }]},
    { id:'st1c', name:'Personal accountability & drive', defaultMins:4, purpose:"Test whether the interviewee takes genuine personal accountability for outcomes, or tends to attribute responsibility to structures, others, or circumstances.", examples:["What are you personally driving right now to move the organisation forward?","Can you give me an example of a time you pushed hard for something that mattered — even when it was difficult?","When things don't go to plan, how do you typically respond?"], crit:[{ id:'c_st1c_1', name:'Personal accountability', hi:'Clear ownership; does not deflect responsibility', lo:'Blames structures, people, or circumstances' },{ id:'c_st1c_2', name:'Drive and initiative', hi:'Self-starting; identifies what needs to happen and acts', lo:'Reactive; waits to be directed' }]},
    { id:'st1d', name:'Vision for their function', defaultMins:4, purpose:"Understand how clearly the interviewee has thought through what their function needs to become — and whether they are actively leading that change.", examples:["How does your function need to change over the next few years to support the organisation's direction?","What would your team look like at its best — and how far away is that from today?","If you were starting your function from scratch, what would you do differently?"], crit:[{ id:'c_st1d_1', name:'Functional clarity', hi:'Clear picture of where the function needs to go and why', lo:'Vague or reactive — focused on current state only' },{ id:'c_st1d_2', name:'Change leadership within function', hi:'Actively leading transformation within own area', lo:'Maintains status quo; limited appetite for internal change' }]},
    { id:'st1e', name:'Coalition breadth & alignment', defaultMins:5, purpose:"Assess whether the guiding coalition driving transformation is genuinely cross-functional, credible, and aligned — or whether commitment is performative and leadership alignment superficial.", examples:["Who are the key leaders or influencers driving this transformation — and how were they identified?","How would you describe the level of genuine alignment among senior leaders on the direction of change? Where does agreement break down?","Are there influential people who are not yet on board? What are their specific concerns, and how are those being addressed?"], crit:[{ id:'c_st1e_1', name:'Coalition breadth', hi:'Cross-functional coalition including informal influencers, not just formal hierarchy', lo:'Narrow coalition; limited to a small inner circle or a single function' },{ id:'c_st1e_2', name:'Genuine alignment', hi:'Honest about where disagreement exists; actively working to resolve it', lo:'Alignment described as universal when it clearly is not; performative consensus' }]},
    { id:'st1f', name:'Decisive & empowering leadership balance', defaultMins:4, purpose:"Test whether leaders can flex between directing decisively and genuinely empowering others — a critical balance in transformation contexts where both speed and buy-in are required.", examples:["When a critical decision needs to be made during this transformation, how quickly does it get made — and by whom?","Where in the organisation do decisions get stuck, and what causes the bottleneck?","How effectively do leaders empower those closest to the work to make their own decisions within the transformation?"], crit:[{ id:'c_st1f_1', name:'Decision speed and clarity', hi:'Decisions made quickly and clearly; no prolonged ambiguity about who decides what', lo:'Decisions stall; unclear ownership; committee paralysis' },{ id:'c_st1f_2', name:'Empowerment in practice', hi:'Actively delegates decision-making; trusts people closest to the work', lo:'Centralises decisions; creates bottlenecks by retaining control' }]},
    { id:'st1g', name:'Adaptive challenge diagnosis', defaultMins:5, purpose:"Assess whether leaders can distinguish adaptive challenges from technical problems — and resist the common failure of applying technical fixes to adaptive challenges.", examples:["Thinking about the biggest challenges in this transformation, which ones have clear known solutions — and which require people to fundamentally change how they think or work?","Can you describe a situation where an initial fix did not work because the real issue was about mindset or behaviour rather than process or technology?","How comfortable are leaders with sitting in ambiguity — maintaining productive tension without rushing to premature resolution?"], crit:[{ id:'c_st1g_1', name:'Technical vs. adaptive distinction', hi:'Clearly distinguishes between problems with known solutions and those requiring behavioural change', lo:'Treats all challenges as technical; applies process fixes to cultural or behavioural problems' },{ id:'c_st1g_2', name:'Tolerance for productive ambiguity', hi:'Comfortable holding tension and ambiguity while the organisation works through adaptive change', lo:'Rushes to certainty; resolves ambiguity prematurely with quick fixes' }]}
  ]},
  { id:'t2', name:'Competitive landscape & customer focus', subtopics:[
    { id:'st2a', name:'Competitive landscape & differentiation', defaultMins:4, purpose:"Test whether the interviewee understands which priorities will drive competitive success and how deeply they have thought through the path to get there.", examples:["What are the main areas the organisation needs to focus on to differentiate itself from competitors?","Where does the organisation need to win, and how does that compare to where it focuses today?","What are competitors doing that concerns you most?"], crit:[{ id:'c_st2a_1', name:'Understanding of key drivers', hi:'Identifies the right levers — operations, technology, culture, customer experience', lo:'Superficial or scattered thinking' },{ id:'c_st2a_2', name:'Depth of thinking', hi:'Demonstrates detailed understanding of what change requires', lo:'High-level only; lacks practical detail' }]},
    { id:'st2b', name:'Customer understanding', defaultMins:4, purpose:"Understand how well the interviewee knows the organisation's customers, why they buy, and what differentiates the organisation from alternatives.", examples:["Why do customers choose you? What differentiates you from the alternatives?","How well do you feel the organisation really understands its customers right now?","Where is the biggest gap between what customers want and what the organisation currently delivers?"], crit:[{ id:'c_st2b_1', name:'Competitive awareness', hi:'Clear grasp of who competitors are and how customers choose', lo:'Vague or limited awareness of competitive dynamics' },{ id:'c_st2b_2', name:'Realism and concreteness', hi:'Grounded, specific view of customer behaviour and market position', lo:'Generic or abstract statements without evidence' },{ id:'c_st2b_3', name:'Commercial awareness', hi:'Connects customer view to profitability, market position, or competitive advantage', lo:'Disconnected from business fundamentals' }]},
    { id:'st2c', name:'Market trends & disruption', defaultMins:4, purpose:"Gauge whether the interviewee is tracking external trends and disruptions that could affect the organisation — and thinking proactively about the implications.", examples:["What external trends or disruptions concern you most over the next three to five years?","How is your industry changing, and is the organisation keeping pace?","Where do you think the biggest threats to your current business model are coming from?"], crit:[{ id:'c_st2c_1', name:'External awareness', hi:'Tracks and interprets external trends; connects them to organisational implications', lo:'Internally focused; limited awareness of external environment' },{ id:'c_st2c_2', name:'Forward thinking', hi:'Anticipates disruption and positions the organisation in advance', lo:'Reactive; deals with change only once it arrives' }]},
    { id:'st2d', name:'Commercial strategy & growth', defaultMins:4, purpose:"Understand how the interviewee thinks about commercial opportunities — and whether they see growth as something they personally own.", examples:["Where do you see the best opportunities for the organisation to grow or improve its commercial position?","What would it take to meaningfully increase revenue or market share in the next two years?","Are there areas where you think the organisation is leaving money on the table?"], crit:[{ id:'c_st2d_1', name:'Commercial instinct', hi:'Identifies credible, specific growth opportunities with a sense of how to capture them', lo:'Vague or limited commercial thinking' },{ id:'c_st2d_2', name:'Ownership of growth', hi:'Sees commercial growth as part of their personal agenda', lo:'Defers commercial thinking to others' }]},
    { id:'st2e', name:'External orientation & ecosystem engagement', defaultMins:4, purpose:"Assess whether external intelligence flows systematically into strategic decision-making, and whether frontline insights are actively acted upon.", examples:["How systematically does external insight — from customers, competitors, regulators, or partners — flow into strategic decision-making here?","How often are ideas or observations from frontline employees closest to customers actually acted upon by senior leadership?","Where is the organisation most at risk of being blindsided by external developments it is not currently tracking?"], crit:[{ id:'c_st2e_1', name:'External intelligence systems', hi:'Systematic mechanisms exist to capture and act on external intelligence; not ad hoc', lo:'Externally disconnected; relies on leadership intuition rather than structured sensing' },{ id:'c_st2e_2', name:'Frontline insight activation', hi:'Frontline observations regularly reach and influence senior decision-making', lo:'Frontline insight ignored or filtered out before reaching leadership' }]}
  ]},
  { id:'t3', name:'Performance culture', subtopics:[
    { id:'st3a', name:'Head office efficiency', defaultMins:4, purpose:"Test whether the interviewee understands what is slowing down head office operations and is committed to improving it.", examples:["What needs to happen to improve the day-to-day efficiency of the head office?","Where are the biggest sources of waste or friction in how head office operates today?","If you could remove one structural barrier to getting things done faster at head office, what would it be?"], crit:[{ id:'c_st3a_1', name:'Commitment to efficiency', hi:'Identifies specific improvements and shows ownership to drive them', lo:"Vague, passive, or sees it as someone else's problem" },{ id:'c_st3a_2', name:"Clarity on what's not working", hi:'Pinpoints specific inefficiencies or bottlenecks', lo:'General complaints without concrete examples' }]},
    { id:'st3b', name:'Front-line operational performance', defaultMins:6, purpose:"Gauge the interviewee's commitment to operational performance and whether they understand the real challenges on the ground.", examples:["What needs to happen to improve the day-to-day profitability and effectiveness of front-line operations?","How well do you understand what's getting in the way of performance at the front line?","What support do front-line managers need that they are not currently getting?"], crit:[{ id:'c_st3b_1', name:'Front-line commitment', hi:'Shows genuine focus on helping front-line teams perform better', lo:'Distant or indifferent to front-line challenges' },{ id:'c_st3b_2', name:'End-to-end understanding', hi:'Understands what happens on the ground; knows which levers drive efficiency', lo:'Detached from front-line realities' }]},
    { id:'st3c', name:'Cross-functional collaboration', defaultMins:4, purpose:"Understand how well the interviewee collaborates across the organisation and whether they see collaboration as a lever for performance or a source of friction.", examples:["How well do different parts of the organisation work together — and where are the biggest friction points?","What gets in the way of teams collaborating effectively across functions?","Can you give me an example of a time a cross-functional effort worked well — and one where it didn't?"], crit:[{ id:'c_st3c_1', name:'Collaborative mindset', hi:'Actively seeks to work across functions; sees collaboration as a performance driver', lo:'Territorial or transactional in cross-functional relationships' },{ id:'c_st3c_2', name:'Systemic awareness', hi:'Understands how siloed working affects overall performance', lo:'Views collaboration issues as interpersonal rather than structural' }]},
    { id:'st3d', name:'Performance measurement & accountability', defaultMins:4, purpose:"Understand whether the interviewee has clarity on what good performance looks like and holds themselves and their team accountable to it.", examples:["How do you know whether your team is performing well? What does good look like?","Where do you feel the organisation's performance management approach is working, and where is it falling short?","How transparent are people about performance gaps — and what happens when targets are missed?"], crit:[{ id:'c_st3d_1', name:'Clarity on performance standards', hi:'Can describe what good looks like with specificity', lo:'Vague about performance expectations or measures' },{ id:'c_st3d_2', name:'Accountability culture', hi:'Holds self and team accountable; addresses underperformance directly', lo:'Avoids difficult conversations; tolerates underperformance' }]},
    { id:'st3e', name:'Accountability & consequence management', defaultMins:4, purpose:"Assess whether genuine accountability exists for transformation commitments — including both positive recognition of early adopters and constructive consequences for persistent non-adoption.", examples:["What happens when commitments made as part of the transformation are not met?","How are early adopters and change champions recognised and rewarded — and how are persistent blockers addressed?","Do people take personal ownership for outcomes in the transformation, or is blame-shifting common?"], crit:[{ id:'c_st3e_1', name:'Consequence clarity', hi:'Clear and consistent consequences — positive and negative — for transformation behaviours', lo:'No real consequences; non-adoption tolerated indefinitely; accountability is rhetorical' },{ id:'c_st3e_2', name:'Personal ownership', hi:'Individuals own outcomes; does not deflect or attribute responsibility to others', lo:'Blame-shifting; diffusion of responsibility; waits for others to act' }]},
    { id:'st3f', name:'Innovation & learning cadence', defaultMins:4, purpose:"Assess whether the organisation has the discipline to test, learn, and adapt during transformation — through structured experimentation, post-mortems, and knowledge sharing.", examples:["How does the organisation approach experimentation — is there a structured process for testing new ideas before scaling?","When something fails during the transformation, is there a systematic process for capturing and sharing lessons — or does the organisation tend to move on without reflection?","Can you give an example of a time the organisation changed course based on what it learned during the transformation?"], crit:[{ id:'c_st3f_1', name:'Test-and-learn discipline', hi:'Structured approach to piloting; learns before scaling; comfortable with iteration', lo:'Big-bang execution only; no structured experimentation; failure is hidden not learned from' },{ id:'c_st3f_2', name:'Reflective practice', hi:'Captures and shares lessons systematically; retrospectives are standard practice', lo:'Moves on without reflection; same mistakes repeated across initiatives' }]}
  ]},
  { id:'t4', name:'Change readiness & transformation', subtopics:[
    { id:'st4a', name:'Leading change in underperforming areas', defaultMins:4, purpose:"Understand how well the interviewee grasps the challenges facing underperforming areas and whether they will actively lead and role model the changes needed.", examples:["What are the biggest challenges facing managers in underperforming areas, and what needs to be done to help them?","How would you describe the quality of leadership in parts of the business that are struggling — and what needs to change?","What does it take to turn around a team or unit that is not delivering?"], crit:[{ id:'c_st4a_1', name:'Active leadership of change', hi:'Takes ownership; willing to drive change personally', lo:'Passive; waits for others to act' },{ id:'c_st4a_2', name:'Cultural role modelling', hi:'Will champion new ways of working and cross-functional teamwork', lo:'Unlikely to role model or promote change' }]},
    { id:'st4b', name:'Organisational change readiness', defaultMins:4, purpose:"Gauge the interviewee's personal openness to change and their understanding of what transformation requires from the organisation.", examples:["In your view, how ready is the organisation to change? What would it take to get everyone fully committed?","What is the single biggest barrier to the organisation moving faster on transformation?","Have you been through a significant transformation before — what did you learn from it?"], crit:[{ id:'c_st4b_1', name:'Openness to change', hi:"Acknowledges the need for change and engages constructively with what's required", lo:'Defensive, dismissive, or resistant' },{ id:'c_st4b_2', name:'Commitment to change', hi:"Committed in an informed manner; understands what's involved", lo:'Indifferent or actively resisting' }]},
    { id:'st4c', name:'Technology & data readiness', defaultMins:4, purpose:"Understand how well-positioned the interviewee believes the organisation is to use technology and data as drivers of performance.", examples:["How well-positioned is the organisation to use technology and data to drive performance?","Where do you think technology could make the biggest difference in your area — and what's stopping that from happening?","How comfortable are you with data-driven decision making, and how does that show up in how your team operates?"], crit:[{ id:'c_st4c_1', name:'Digital awareness', hi:'Can identify specific technology opportunities relevant to their area', lo:'Limited engagement with technology or data as performance levers' },{ id:'c_st4c_2', name:'Personal adoption', hi:'Actively uses data and technology in their own decision making', lo:'Delegates technology thinking; not personally engaged' }]},
    { id:'st4d', name:'Cultural barriers to transformation', defaultMins:4, purpose:"Surface the cultural or behavioural patterns most likely to obstruct transformation — and understand how much personal ownership the interviewee takes for shifting those patterns.", examples:["What cultural or behavioural patterns are most likely to get in the way of transformation here?","Where do you see the most resistance to change, and what drives it?","What would need to change about how people behave day-to-day for this transformation to succeed?"], crit:[{ id:'c_st4d_1', name:'Cultural insight', hi:'Names specific behaviours or patterns with honesty and nuance', lo:'Generic or superficial cultural observations' },{ id:'c_st4d_2', name:'Personal responsibility for culture', hi:'Sees themselves as a shaper of culture; takes ownership for modelling change', lo:"Views culture as someone else's responsibility" }]},
    { id:'st4e', name:'ADKAR barrier-point assessment', defaultMins:5, purpose:"Identify precisely where individual change readiness breaks down — whether at Awareness, Desire, Knowledge, Ability, or Reinforcement — enabling targeted interventions.", examples:["How aware are the people affected by this change of why it is happening and what the business case is?","To what extent do people genuinely want to participate in and support this change — what is driving motivation or resistance?","Do people know how to work in the new way — and are they able to demonstrate those skills in practice?"], crit:[{ id:'c_st4e_1', name:'Awareness & desire', hi:'People understand why the change is happening and have genuine motivation to support it', lo:'People do not understand the case for change or actively do not want it' },{ id:'c_st4e_2', name:'Knowledge, ability & reinforcement', hi:'People have been trained, can demonstrate new behaviours, and are reinforced for doing so', lo:'Knowledge gaps, inability to execute, or regression to old habits without reinforcement' }]},
    { id:'st4f', name:'Psychological transition state', defaultMins:5, purpose:"Surface the emotional and identity-level responses to change that most frequently derail transformation — particularly what people are being asked to let go of.", examples:["What are people being asked to let go of with this change — what routines, relationships, status, or identity are at risk?","Has leadership clearly communicated what is ending and what is continuing — or is there ambiguity about what is changing?","How would you describe the emotional state of the people most affected — are they in denial, resistance, or genuine engagement?"], crit:[{ id:'c_st4f_1', name:'Loss acknowledgement', hi:'Leadership has explicitly named what people are giving up; losses are honoured not minimised', lo:'Communication focuses only on gains; losses ignored; resistance dismissed as irrational' },{ id:'c_st4f_2', name:'Transition stage awareness', hi:'Clear sense of where people are in the transition; neutral zone is being managed with support', lo:'No awareness of psychological transition; people left to navigate the in-between alone' }]},
    { id:'st4g', name:'Psychological safety for change', defaultMins:4, purpose:"Assess whether the interpersonal climate enables the candour, error reporting, and experimentation essential for adaptive change.", examples:["If someone on your team made a mistake during this transformation, would they feel safe admitting it — or would they try to cover it up?","How safe do people feel to challenge a decision or raise a concern about the transformation with senior leadership?","Is there a difference between what people say in formal meetings about the change and what they say privately?"], crit:[{ id:'c_st4g_1', name:'Candour and error safety', hi:'People voice concerns, admit mistakes, and raise dissenting views without fear of consequence', lo:'Self-censorship is widespread; people say what is safe rather than what is true' },{ id:'c_st4g_2', name:'Challenge upward', hi:'Comfortable challenging senior leadership; dissent is welcomed not punished', lo:'Deference culture; no one challenges leadership; problems surface too late' }]},
    { id:'st4h', name:'Short-term wins & momentum', defaultMins:4, purpose:"Assess whether the transformation has produced visible, credible early successes that build momentum and counter cynicism.", examples:["What quick wins or early successes has this transformation produced that people can actually point to?","How are these successes being communicated and celebrated — and are they reaching people beyond the immediate project team?","After initial successes, is the organisation pressing harder into more difficult changes — or is there a risk of declaring victory too early?"], crit:[{ id:'c_st4h_1', name:'Visible early wins', hi:'Concrete, credible wins exist and are widely visible; not cherry-picked or spun', lo:'No tangible early wins; or wins exist but are not communicated or celebrated' },{ id:'c_st4h_2', name:'Momentum building', hi:'Early wins are being used to build credibility and accelerate bolder changes', lo:'Early wins treated as the destination; transformation loses momentum after initial progress' }]}
  ]},

function buildQuestions(topicConfig) {
  const qs = [];
  TOPIC_LIBRARY.forEach(topic => {
    const tc = topicConfig[topic.id];
    if (!tc || !tc.enabled) return;
    (tc.selected || []).forEach(stId => {
      const st = topic.subtopics.find(s => s.id === stId);
      if (!st) return;
      qs.push({ id:topic.id+'_'+stId, sub:st.name, topicId:topic.id, topicName:topic.name, text:(tc.questions[stId]||'').trim()||st.examples[0], purpose:st.purpose, mins:tc.mins[stId]||st.defaultMins, crit:st.crit });
    });
  });
  return qs;
}

function ReportTab({ people, topicConfig, sessions, ivwAdj, eng }) {
  const allQs = buildQuestions(topicConfig);
  const activeTopics = TOPIC_LIBRARY.filter(t=>topicConfig[t.id]?.enabled&&(topicConfig[t.id]?.selected||[]).length>0);
  const interviewed = people.filter(p=>sessions[p.id]&&Object.keys(sessions[p.id].scores||{}).length>0);
  const CAT_ORDER = ['Executive','Senior Management','Middle Management'];
  const today = new Date().toLocaleDateString('en-GB',{ day:'numeric', month:'long', year:'numeric' });

  function personAdj(pid){ const p=people.find(x=>x.id===pid); if(!p||(p.ivws||[]).length===0) return 0; const adjs=(p.ivws||[]).map(name=>ivwAdj[name]||0); return adjs.reduce((a,b)=>a+b,0)/adjs.length; }
  function applyAdj(val,pid){ if(val==null) return null; return Math.min(100,Math.max(0,Math.round(val+personAdj(pid)))); }
  function personOverall(pid){ const sess=sessions[pid]; if(!sess) return null; const vals=allQs.flatMap(q=>q.crit.map(c=>sess.scores?.[c.id])).filter(v=>v!=null); const raw=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null; return raw!=null?applyAdj(Math.round(raw),pid):null; }
  function personTopicScore(pid,topicId){ const sess=sessions[pid]; if(!sess) return null; const tqs=allQs.filter(q=>q.topicId===topicId); const vals=tqs.flatMap(q=>q.crit.map(c=>sess.scores?.[c.id])).filter(v=>v!=null); const raw=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null; return raw!=null?applyAdj(Math.round(raw),pid):null; }
  function bColor(v){ return v==null?'#888884':v>=70?'#1E8C4A':v>=40?'#C07A00':'#C0392B'; }
  function bBg(v){ return v==null?'#F0EFEC':v>=70?'rgba(30,140,74,.12)':v>=40?'rgba(192,122,0,.1)':'rgba(192,57,43,.1)'; }
  function bLabel(v){ return v==null?'Not assessed':v>=70?'Strong':v>=40?'Developing':'At risk'; }

  const noData = interviewed.length===0;
  const cohortAvg = (() => {
    const vals = interviewed.map(p=>personOverall(p.id)).filter(v=>v!=null);
    return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : null;
  })();
  const topicAvgs = activeTopics.map(t=>{ const vals=interviewed.map(p=>personTopicScore(p.id,t.id)).filter(v=>v!=null); return { name:t.name, avg:vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):null }; });
  const strength = [...topicAvgs].filter(x=>x.avg!=null).sort((a,b)=>b.avg-a.avg)[0];
  const risk = [...topicAvgs].filter(x=>x.avg!=null).sort((a,b)=>a.avg-b.avg)[0];

  // Shared page style
  const page = { background:'#FFFFFF', padding:'48px 56px', maxWidth:860, margin:'0 auto 40px', boxShadow:'0 2px 24px rgba(0,0,0,.08)', borderRadius:4, position:'relative' };
  const rule = { borderTop:'2px solid #009898', marginBottom:24 };
  const sectionHead = { fontSize:11, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:'#009898', marginBottom:16 };

  return React.createElement('div', { style:{ background:'#F0EFEC', padding:'32px 24px', minHeight:'100vh' } },
    // ── Toolbar ────────────────────────────────────────────────────────
    React.createElement('div', { className:'no-print', style:{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:28, maxWidth:860, margin:'0 auto 28px' } },
      React.createElement('div', null,
        React.createElement('h2', { style:{ fontSize:20, fontWeight:700, marginBottom:2 } }, 'Change Readiness Report'),
        React.createElement('p', { style:{ color:'#555550', fontSize:13, margin:0 } }, 'Preview below. Click Print to save as PDF — select “Save as PDF” in the print dialog.')
      ),
      React.createElement('button', { className:'ww-btn-primary', style:{ height:44 }, onClick:()=>window.print() },
        '\ud83d\udda8\ufe0f  Print / Save as PDF'
      )
    ),

    // ── PAGE 1: Cover ─────────────────────────────────────────────────
    React.createElement('div', { className:'report-page', style:{ ...page, minHeight:760, display:'flex', flexDirection:'column', justifyContent:'space-between' } },
      // Header bar
      React.createElement('div', { style:{ borderBottom:'3px solid #1A1A1A', paddingBottom:24, marginBottom:40 } },
        React.createElement('img', { src:LOGO_SRC, style:{ height:44, display:'block' } })
      ),
      // Centre content
      React.createElement('div', { style:{ flex:1, display:'flex', flexDirection:'column', justifyContent:'center' } },
        React.createElement('div', { style:{ fontSize:11, fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase', color:'#009898', marginBottom:16 } }, 'Confidential'),
