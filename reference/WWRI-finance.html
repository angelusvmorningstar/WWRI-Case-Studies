<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#F5F4F0;font-family:'Calibri','Segoe UI',system-ui,sans-serif;color:#1A1A1A}
.btn-primary{display:inline-flex;align-items:center;gap:7px;background:#009898;color:#fff;border:none;border-radius:6px;padding:0 18px;height:38px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .12s;white-space:nowrap}
.btn-primary:hover{background:#007878}
.btn-ghost{display:inline-flex;align-items:center;gap:7px;background:none;color:#555550;border:1px solid #DDDBD6;border-radius:6px;padding:0 14px;height:36px;font-size:13px;cursor:pointer;font-family:inherit;transition:background .1s;white-space:nowrap}
.btn-ghost:hover{background:rgba(0,0,0,.04)}
.btn-sm{height:28px;padding:0 10px;font-size:11px}
.btn-danger{background:#C0392B}
.btn-danger:hover{background:#a93226}
.card{background:#FFF;border:1px solid #DDDBD6;border-radius:10px}
.tab-btn{display:flex;align-items:center;padding:0 20px;background:none;border:none;border-bottom:2px solid transparent;color:#555550;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;height:44px;transition:color .1s;white-space:nowrap}
.tab-btn.on{color:#009898;border-bottom-color:#009898}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888884;background:#F5F4F0;border-bottom:1px solid #DDDBD6;text-align:left;white-space:nowrap}
.tbl td{padding:11px 14px;border-bottom:1px solid #DDDBD6}
.tbl tr:nth-child(even) td{background:#FAFAF8}
.tbl tr:hover td{background:#F0EFEC}
.tbl tfoot td{padding:12px 14px;background:#F5F4F0;border-top:2px solid #DDDBD6;font-weight:700}
.mono{font-family:'Cascadia Code',Consolas,monospace}
.r{text-align:right}
.badge{display:inline-flex;align-items:center;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px}
::-webkit-scrollbar{width:6px;height:6px}
.print-only{display:none}
@media print{
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{background:#fff!important;font-family:'Calibri','Segoe UI',sans-serif;margin:0;padding:0}
  #app>*:not(.print-only){display:none!important}
  .print-only{display:block!important}
  .print-page{background:#fff!important;margin:0!important;padding:0!important;box-shadow:none!important;border:none!important;border-radius:0!important}
  .page-break{page-break-before:always;break-before:page;margin-top:0;padding-top:0}
  table{page-break-inside:auto}
  tr{page-break-inside:avoid;break-inside:avoid}
  @page{size:A4 portrait;margin:12mm 14mm 12mm 14mm;marks:none}
  @page:first{margin-top:12mm}
}
::-webkit-scrollbar-track{background:#F5F4F0}
::-webkit-scrollbar-thumb{background:#DDDBD6;border-radius:3px}
</style>

function h(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function lsGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

function parseLine(line, delim){
  if(delim==='\t'){return line.split('\t').map(function(v){return v.trim()});}
  var r=[],cur='',q=false,i=0,ch;
  for(;i<line.length;i++){
    ch=line[i];
    if(ch==='"'){q=!q}
    else if(ch===','&&!q){r.push(cur);cur=''}
    else{cur+=ch}
  }
  r.push(cur);
  return r;
}
function parseCSV(text){
  var lines=text.trim().split('\n');
  var firstLine=lines[0];
  var delim=firstLine.indexOf('\t')!==-1?'\t':',';
  var hdr=parseLine(firstLine,delim).map(function(x){return x.trim()});
  return lines.slice(1).filter(Boolean).map(function(l){
    var vals=parseLine(l,delim),row={};
    hdr.forEach(function(k,i){row[k]=(vals[i]||'').trim()});
    return row;
  });
}

function fUSD(n,c){
  if(c){
    if(Math.abs(n)>=1e6)return'$'+(n/1e6).toFixed(2)+'M';
    if(Math.abs(n)>=1e3)return'$'+Math.round(n/1e3).toLocaleString()+'K';
    return'$'+Math.round(n).toLocaleString();
  }
  return'$'+Math.round(n).toLocaleString('en-US');
}
function fDate(s){
  if(!s)return'\u2013';
  var d=new Date(s);
  if(isNaN(d.getTime()))return s;
  return d.toLocaleDateString('en-AU',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function fPct(n){ return(n*100).toFixed(1)+'%'; }
function fNum(n){ return Math.round(n).toLocaleString('en-US'); }

  var nm=fc.months.length;

  // Sum overhead
  var oh=[];for(var i=0;i<nm;i++)oh.push(0);
  EXP_LINES.forEach(function(l){
    if(l.cat==='overhead'){
      for(var i=0;i<nm;i++)oh[i]+=(exp[l.key]||[])[i]||0;
    }
  });
  fc.opex.total_overhead=oh;

  // Sum discretionary
  var disc=[];for(var i=0;i<nm;i++)disc.push(0);
  EXP_LINES.forEach(function(l){
    if(l.cat==='discretionary'){
      for(var i=0;i<nm;i++)disc[i]+=(exp[l.key]||[])[i]||0;
    }
  });
  fc.discretionary.total=disc;

  // Tax
  fc.tax=exp.tax||[0,0,0,0,0,0,0,0,0];

  // Total opex
  var tot=[];for(var i=0;i<nm;i++)tot.push(oh[i]+disc[i]+(fc.tax[i]||0));
  fc.opex_total=tot;

  // Net cash = gross profit - opex
  var net=[];for(var i=0;i<nm;i++)net.push(fc.gp_total[i]-tot[i]);
  fc.net_cash=net;

  // Potential net = net + potential GP
  var pnet=[];for(var i=0;i<nm;i++){
    pnet.push(net[i]+(fc.potential.au_gp[i]||0)+(fc.potential.eu_gp[i]||0)+(fc.potential.us_gp[i]||0));
  }
  fc.potential_net=pnet;

  // Cash positions
  var openBal=fc.opening_forecast[0]; // starting balance from actuals
  for(var i=0;i<nm;i++){
    fc.opening_forecast[i]=i===0?openBal:fc.closing_forecast[i-1];
    fc.closing_forecast[i]=fc.opening_forecast[i]+net[i];
  }
  for(var i=0;i<nm;i++){
    fc.opening_potential[i]=i===0?openBal:fc.closing_potential[i-1];
    fc.closing_potential[i]=fc.opening_potential[i]+pnet[i];
  }
}

// ── Revenue → Forecast wiring ────────────────────────────────────────────────
function recalcRevForecast(){
  var fc=SEED_FCST;
  var fx=S.fx||SEED_FX;
  var rev=S.rev||[];
  var nm=fc.months.length;

  // Zero out revenue arrays (keep index 0 = actuals untouched for non-rev rows)
  var rAU=[],cAU=[],gAU=[];
  var rEU=[],cEU=[],gEU=[];
  var rUS=[],cUS=[],gUS=[];
  var pAUr=[],pAUg=[];
  var pEUr=[],pEUg=[];
  var pUSr=[],pUSg=[];
  for(var i=0;i<nm;i++){
    rAU.push(0);cAU.push(0);gAU.push(0);
    rEU.push(0);cEU.push(0);gEU.push(0);
    rUS.push(0);cUS.push(0);gUS.push(0);
    pAUr.push(0);pAUg.push(0);
    pEUr.push(0);pEUg.push(0);
    pUSr.push(0);pUSg.push(0);
  }

  rev.forEach(function(r){
    var mi=fc.months.indexOf(r.dueMo);
    if(mi===-1)return; // outside forecast window

    var fxr=fx[r.cur]||1;
    var revAud=r.rev*fxr;
    var refFee=revAud*(r.refPct||0);
    var projTotal=revAud-refFee;
    var ieFees=projTotal*(r.iePct||0);
    var gp=projTotal-ieFees;
    var cos=refFee+ieFees;

    var isForecasted=(r.status===1||r.status===2); // Contracted or Certain
    var ent=r.entity||'AU';

    if(isForecasted){
      if(ent==='AU'){rAU[mi]+=revAud;cAU[mi]+=cos;gAU[mi]+=gp;}
      else if(ent==='EU'){rEU[mi]+=revAud;cEU[mi]+=cos;gEU[mi]+=gp;}
      else if(ent==='US'){rUS[mi]+=revAud;cUS[mi]+=cos;gUS[mi]+=gp;}
    } else {
      // Uncertain → potential
      if(ent==='AU'){pAUr[mi]+=revAud;pAUg[mi]+=gp;}
      else if(ent==='EU'){pEUr[mi]+=revAud;pEUg[mi]+=gp;}
      else if(ent==='US'){pUSr[mi]+=revAud;pUSg[mi]+=gp;}
    }
  });

  // Preserve actuals column (index 0) from original seed
  rAU[0]=fc.rev_au.total[0];cAU[0]=fc.cos_au.total[0];gAU[0]=fc.gp_au[0];

  // Update forecast arrays
  fc.rev_au.total=rAU;fc.cos_au.total=cAU;fc.gp_au=gAU;
  fc.rev_eu.total=rEU;fc.cos_eu.total=cEU;fc.gp_eu=gEU;
  fc.rev_us.total=rUS;fc.cos_us.total=cUS;fc.gp_us=gUS;

  // Total GP
  var gpT=[];for(var i=0;i<nm;i++)gpT.push(gAU[i]+gEU[i]+gUS[i]);
  fc.gp_total=gpT;

  // Potential
  fc.potential.au_rev=pAUr;fc.potential.au_gp=pAUg;
  fc.potential.eu_rev=pEUr;fc.potential.eu_gp=pEUg;
  fc.potential.us_rev=pUSr;fc.potential.us_gp=pUSg;

  // Now recalc opex and cash
  recalcFcst();
}

// ── FX rate fetch ────────────────────────────────────────────────────────────
function fetchFX(){
  msg('Fetching rates...');
  fetch('https://api.frankfurter.app/latest?from=AUD&to=EUR,USD,GBP,SGD')
    .then(function(res){return res.json()})
    .then(function(data){
      if(!data.rates)throw new Error('No rates returned');
      // frankfurter returns how much 1 AUD buys, we need how much 1 foreign = AUD
      var fx=Object.assign({},S.fx);
      fx.AUD=1;
      if(data.rates.EUR)fx.EUR=Math.round((1/data.rates.EUR)*100)/100;
      if(data.rates.USD)fx.USD=Math.round((1/data.rates.USD)*100)/100;
      if(data.rates.GBP)fx.GBP=Math.round((1/data.rates.GBP)*100)/100;
      if(data.rates.SGD)fx.SGD=Math.round((1/data.rates.SGD)*100)/100;
      lsSet('ww_fx',fx);
      S.fx=fx;
      recalcRevForecast();
      touch();
      msg('FX rates updated ('+new Date().toLocaleDateString('en-AU')+')');
    })
    .catch(function(err){
      msg('FX fetch failed: '+err.message);
    });
}

  };

function restoreBackup(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(){
    var f=inp.files[0];if(!f)return;
    var r=new FileReader();
    r.onload=function(){
      try{
        var data=JSON.parse(r.result);
        if(data.ww_bs)lsSet(K_BS,data.ww_bs);
        if(data.ww_pl)lsSet(K_PL,data.ww_pl);
        if(data.ww_rev)lsSet(K_REV,data.ww_rev);
        if(data.ww_exp)lsSet(K_EXP,data.ww_exp);
        if(data.ww_ref)lsSet(K_REF,data.ww_ref);
        if(data.ww_fx)lsSet('ww_fx',data.ww_fx);
        location.reload();
      }catch(e){msg('Invalid backup file');}
    };
    r.readAsText(f);
  };
  inp.click();
}

function sortRevPipeline(){

    if(cc!==0)return cc;
    var cp=(a.project||'').localeCompare(b.project||'');
    if(cp!==0)return cp;
    return(a.phase||'').localeCompare(b.phase||'');
  });

  set({rev:rev});
}

// ── SVG Cash Chart ───────────────────────────────────────────────────────────
function svgCashChart(data){
  var W=740,H=300,padL=72,padR=24,padT=24,padB=52;
  var cW=W-padL-padR, cH=H-padT-padB;
  var n=data.length;
  if(n<2)return'';

  // Find min/max across both series
  var allVals=[];
  data.forEach(function(d){allVals.push(d.forecast,d.potential)});
  var rawMin=Math.min.apply(null,allVals);
  var rawMax=Math.max.apply(null,allVals);
  // Add 10% padding and round to nice numbers
  var range=rawMax-rawMin||1;
  var vMin=Math.floor((rawMin-range*0.08)/10000)*10000;
  var vMax=Math.ceil((rawMax+range*0.08)/10000)*10000;
  if(vMin>0)vMin=0; // Always show zero line if data is positive

  function xPos(i){return padL+(cW/(n-1))*i;}
  function yPos(v){return padT+cH-(((v-vMin)/(vMax-vMin))*cH);}

  var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:'+W+'px;display:block">';

  // Gridlines
  var gridSteps=5;
  var gridStep=(vMax-vMin)/gridSteps;
  for(var g=0;g<=gridSteps;g++){
    var gv=vMin+gridStep*g;
    var gy=yPos(gv);
    svg+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" stroke="'+BRD+'" stroke-width="1"/>';
    svg+='<text x="'+(padL-8)+'" y="'+(gy+4)+'" text-anchor="end" font-size="11" fill="'+MUT+'" font-family="Cascadia Code,Consolas,monospace">';
    if(Math.abs(gv)>=1000)svg+='$'+Math.round(gv/1000)+'K';
    else svg+='$'+Math.round(gv);
    svg+='</text>';
  }

  // Zero line (if visible)
  if(vMin<0&&vMax>0){
    var zy=yPos(0);
    svg+='<line x1="'+padL+'" y1="'+zy+'" x2="'+(W-padR)+'" y2="'+zy+'" stroke="'+MUT+'" stroke-width="1" stroke-dasharray="4,3"/>';
  }

  // Negative zone fill (below zero)
  if(vMin<0){
    var zy2=yPos(0);
    var botY=yPos(vMin);
    svg+='<rect x="'+padL+'" y="'+zy2+'" width="'+cW+'" height="'+(botY-zy2)+'" fill="'+RED+'" opacity="0.04"/>';
  }

  // Build path strings
  var fPath='',pPath='';
  // Also build fill path for potential area between the two lines
  var areaPath='';
  data.forEach(function(d,i){
    var x=xPos(i);
    var yf=yPos(d.forecast);
    var yp=yPos(d.potential);
    fPath+=(i===0?'M':'L')+x+','+yf;
    pPath+=(i===0?'M':'L')+x+','+yp;
  });

  // Fill area between potential and forecast
  var fillPath='';
  for(var i=0;i<n;i++){fillPath+=(i===0?'M':'L')+xPos(i)+','+yPos(data[i].potential);}
  for(var i=n-1;i>=0;i--){fillPath+='L'+xPos(i)+','+yPos(data[i].forecast);}
  fillPath+='Z';
  svg+='<path d="'+fillPath+'" fill="'+GRN+'" opacity="0.08"/>';

  // Potential line (behind)
  svg+='<path d="'+pPath+'" fill="none" stroke="'+GRN+'" stroke-width="2" stroke-dasharray="6,4"/>';

  // Forecast line (front)
  svg+='<path d="'+fPath+'" fill="none" stroke="'+TEL+'" stroke-width="2.5"/>';

  // Data points and labels
  data.forEach(function(d,i){
    var x=xPos(i);
    var yf=yPos(d.forecast);
    var yp=yPos(d.potential);

    // Forecast dot
    svg+='<circle cx="'+x+'" cy="'+yf+'" r="4" fill="'+SUR+'" stroke="'+TEL+'" stroke-width="2"/>';
    // Potential dot (only if different)
    if(Math.abs(d.potential-d.forecast)>500){
      svg+='<circle cx="'+x+'" cy="'+yp+'" r="3.5" fill="'+SUR+'" stroke="'+GRN+'" stroke-width="1.5"/>';
    }

    // Value label on forecast (show for first, last, min, max, and every 3rd)
    if(i===0||i===n-1||i%3===0||d.forecast===Math.min.apply(null,data.map(function(d2){return d2.forecast}))||d.forecast===Math.max.apply(null,data.map(function(d2){return d2.forecast}))){
      var labY=d.forecast<0?(yf+16):(yf-10);
      svg+='<text x="'+x+'" y="'+labY+'" text-anchor="middle" font-size="10" font-weight="600" fill="'+(d.forecast<0?RED:TEL)+'" font-family="Cascadia Code,Consolas,monospace">';
      svg+=fUSD(d.forecast,true);
      svg+='</text>';
    }

    // Month label
    svg+='<text x="'+x+'" y="'+(H-padB+20)+'" text-anchor="middle" font-size="11" fill="'+MUT+'">'+d.m+'</text>';
  });

  // Legend
  svg+='<line x1="'+padL+'" y1="'+(H-8)+'" x2="'+(padL+20)+'" y2="'+(H-8)+'" stroke="'+TEL+'" stroke-width="2.5"/>';
  svg+='<text x="'+(padL+26)+'" y="'+(H-4)+'" font-size="11" fill="'+SUB+'">Forecast cash</text>';
  svg+='<line x1="'+(padL+140)+'" y1="'+(H-8)+'" x2="'+(padL+160)+'" y2="'+(H-8)+'" stroke="'+GRN+'" stroke-width="2" stroke-dasharray="6,4"/>';
  svg+='<text x="'+(padL+166)+'" y="'+(H-4)+'" font-size="11" fill="'+SUB+'">Potential cash (incl. uncertain)</text>';

  svg+='</svg>';
  return svg;
}
